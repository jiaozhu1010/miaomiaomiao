                }
            }
            if (text) { const textDiv = document.createElement('div'); textDiv.textContent = text; bubble.appendChild(textDiv); }
            msgDiv.appendChild(avatar); msgDiv.appendChild(bubble);
            chatContainer.appendChild(msgDiv); scrollToBottom();
        }

        lightbox.addEventListener('click', () => lightbox.classList.remove('show'));

        // ===== Send =====
        function setInputEnabled(enabled) { chatInput.disabled = !enabled; sendBtn.disabled = !enabled; btnAttach.disabled = !enabled; if (enabled) chatInput.focus(); }

        let typingTimer = null;
        let typingStartTime = null;

        // 猫咪模式思考阶段（可爱风格）
        const catThinkingPhases = [
            { at: 0,     icon: '🧶', text: '小橘在捋毛线...' },
            { at: 3000,  icon: '🐾', text: '小橘在敲键盘...' },
            { at: 6000,  icon: '✍️', text: '小橘在写信喵...' },
            { at: 10000, icon: '🔍', text: '小橘在翻猫粮袋...' },
            { at: 15000, icon: '😿', text: '今天问题有点难喵' },
            { at: 22000, icon: '🙏', text: '再等一下下喵~' },
        ];

        // 认真模式思考阶段（专业风格）
        const codeThinkingPhases = [
            { at: 0,     icon: '🔍', text: '正在分析问题' },
            { at: 3000,  icon: '🧠', text: '正在推理运算' },
            { at: 6000,  icon: '📝', text: '正在组织答案' },
            { at: 10000, icon: '⚙️', text: '正在深度思考' },
            { at: 18000, icon: '🔬', text: '正在验证信息' },
            { at: 28000, icon: '💡', text: '即将生成回答' },
        ];

        function showTyping() {
            typingIndicator.classList.add('active');
            elapsedTime.textContent = '';
            scrollToBottom();
            typingStartTime = Date.now();

            const phases = currentMode === 'code' ? codeThinkingPhases : catThinkingPhases;
            const initial = phases[0];
            phaseIcon.textContent = initial.icon;
            typingText.textContent = initial.text;

            // 每秒更新计时和阶段文案
            const tick = () => {
                const elapsed = Math.floor((Date.now() - typingStartTime) / 1000);
                elapsedTime.textContent = elapsed >= 1 ? '(' + elapsed + 's)' : '';

                const ms = Date.now() - typingStartTime;
                for (let i = phases.length - 1; i >= 0; i--) {
                    if (ms >= phases[i].at) {
                        phaseIcon.textContent = phases[i].icon;
                        typingText.textContent = phases[i].text;
                        break;
                    }
                }
            };
            tick(); // 立即执行一次
            typingTimer = setInterval(tick, 1000);
        }

        function hideTyping() {
            clearInterval(typingTimer);
            typingTimer = null;
            typingStartTime = null;
            typingIndicator.classList.remove('active');
            elapsedTime.textContent = '';
        }

        async function sendMessage() {
            if (!Auth.isLoggedIn()) { showAuthOverlay(); return; }
            const text = chatInput.value.trim();
            if (!text && pendingFiles.length === 0) return;

            // Ensure we have a conversation
            if (!currentConversationId) { const conv = await ChatHistoryManager.createConversation(currentMode); currentConversationId = conv.id; await renderHistorySidebar(currentMode); }

            const fileNote = pendingFiles.map(f => f.name).join(', ');
            const sendingFiles = [...pendingFiles];

            chatInput.value = '';
            chatInput.style.height = 'auto'; // reset textarea height
            if (isExpanded) toggleExpand();  // collapse expanded input on send
            pendingFiles = [];
            filePreviews.innerHTML = '';

            renderUserMessage(text, fileNote);
            const userContent = text || '请分析我上传的文件';
            conversation.push({ role: 'user', content: userContent });
            await ChatHistoryManager.addMessage(currentMode, currentConversationId, 'user', userContent);

            setInputEnabled(false);
            showTyping();

            // 用于流式接收的变量
            let aiContent = '';
            let streamBubble = null;
            let streamTextDiv = null;
            let streamDone = false;
            let streamError = null;
            let streamThinkingCard = null;
            let streamThinkingContent = null;
            let streamThinkingHeader = null;
            let thinkingContent = '';
            let streamCitationDiv = null;
            let streamCitationCount = 0;

            try {
                const formData = new FormData();
                formData.append('mode', currentMode);
                formData.append('messages', JSON.stringify(conversation));
                formData.append('settings', JSON.stringify(window.getCurrentSettings ? window.getCurrentSettings() : {}));
                for (const file of sendingFiles) formData.append('files', file);

                const response = await Auth.fetch('/api/ai-chat', { method: 'POST', body: formData });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || 'AI 服务异常');
                }

                // SSE 流式读取
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let firstToken = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || !trimmed.startsWith('data: ')) continue;

                        let data;
                        try {
                            data = JSON.parse(trimmed.slice(6));
                        } catch (_) { continue; }

                        if (data.done) {
                            streamDone = true;
                            if (data.truncated) {
                                streamError = '⚠️ AI 响应被截断，但已生成的内容如下：';
                            }
                            continue;
                        }

                        if (data.error) {
                            if (aiContent) {
                                // 已有部分内容，显示出来 + 错误提示
                                streamError = '⚠️ ' + data.error;
                                streamDone = true;
                            } else {
                                throw new Error(data.error);
                            }
                            continue;
                        }

                        if (data.thinking) {
                            // 第一个 thinking token → 创建思考卡片
                            if (!streamThinkingCard) {
                                if (welcomeCard) welcomeCard.style.display = 'none';
                                var card = document.createElement('div');
                                card.className = 'thinking-card';
                                var headerId = 'th-' + Date.now();
                                card.innerHTML = '<div class="thinking-header" id="' + headerId + '"><span class="chevron">▾</span> 🧠 深度思考中...</div><div class="thinking-content"></div>';
                                chatContainer.appendChild(card);
                                streamThinkingCard = card;
                                streamThinkingContent = card.querySelector('.thinking-content');
                                streamThinkingHeader = card.querySelector('.thinking-header');
                                streamThinkingHeader.addEventListener('click', function() {
                                    this.classList.toggle('collapsed');
                                });
                            }
                            thinkingContent += data.thinking;
                            streamThinkingContent.textContent = thinkingContent;
                            var elapsed = typingStartTime ? Math.round((Date.now() - typingStartTime) / 1000) : 0;
                            streamThinkingHeader.innerHTML = '<span class="chevron">▾</span> 🧠 深度思考过程 <span style="margin-left:auto;font-weight:400;color:#999;font-size:11px">' + elapsed + 's</span>';
                            scrollToBottom();
                            continue;
                        }

                        if (data.citation) {
                            if (!streamCitationDiv) {
                                streamCitationDiv = document.createElement('div');
                                streamCitationDiv.className = 'search-citation';
                                streamCitationDiv.innerHTML = '<div class="citation-title">🌐 搜索来源</div>';
                            }
                            var link = document.createElement('a');
                            link.className = 'citation-link'; link.href = data.citation.url || '#';
                            link.target = '_blank'; link.rel = 'noopener noreferrer';
                            link.textContent = '[' + (streamCitationCount + 1) + '] ' + (data.citation.title || data.citation.url || '来源');
                            streamCitationDiv.appendChild(link);
                            streamCitationCount++;
                            continue;
                        }

                        if (data.token) {
                            // 第一个 token 到达 → 隐藏 typing，创建流式气泡
                            if (firstToken) {
                                hideTyping();
                                firstToken = false;

                                if (welcomeCard) welcomeCard.style.display = 'none';
                                const msgDiv = document.createElement('div');
                                msgDiv.className = 'message ai';
                                const avatar = document.createElement('div');
                                avatar.className = 'avatar';
                                avatar.textContent = currentMode === 'code' ? '🤖' : '🐱';
                                const bubble = document.createElement('div');
                                bubble.className = 'bubble';
                                streamTextDiv = document.createElement('div');
                                streamTextDiv.className = 'msg-text streaming';
                                bubble.appendChild(streamTextDiv);
                                msgDiv.appendChild(avatar);
                                msgDiv.appendChild(bubble);
                                chatContainer.appendChild(msgDiv);
                                streamBubble = msgDiv;
                            }

                            aiContent += data.token;
                            // 流式显示纯文本（性能好，不闪烁）
                            streamTextDiv.textContent = aiContent;
                            scrollToBottom();
                        }
                    }
                }

                // 流式读取完毕
                if (!firstToken && !streamDone) {
                    streamDone = true;
                }

            } catch (err) {
                console.error('AI 请求失败:', err);
                if (!aiContent) {
                    // 完全没收到内容，显示具体错误
                    hideTyping();
                    var errMsg = err.message || '网络好像出问题了，等会儿再试试喵~ 🐾';
                    // 过滤掉技术前缀，让用户看到友好但有意义的提示
                    if (errMsg.length > 150) errMsg = errMsg.substring(0, 150) + '...';
                    renderMessage('ai', errMsg, null);
                    setInputEnabled(true);
                    return;
                }
                // 已有部分内容，标记截断
                streamError = '⚠️ 连接中断，以上为部分回复。请重新发送试试喵~';
                streamDone = true;
            }

            // ===== 收尾处理 =====
            hideTyping();

            if (aiContent) {
                // 将流式纯文本替换为 Markdown 渲染
                if (streamTextDiv && streamBubble) {
                    streamTextDiv.textContent = '';
                    streamTextDiv.classList.remove('streaming');
                    renderMarkdown(streamTextDiv, aiContent);
                    // 🐱 根据回复内容更新猫咪表情
                    if (currentMode === 'cat') {
                        var streamAvatar = streamBubble.querySelector('.avatar');
                        if (streamAvatar) streamAvatar.textContent = catEmojiForMood(aiContent);
                    }
                    // 附加引用卡片到消息气泡
                    if (streamCitationDiv && streamCitationCount > 0) {
                        streamBubble.querySelector('.bubble').appendChild(streamCitationDiv);
                    }
                } else {
                    renderMessage('ai', aiContent, null);
                    // 如果有引用卡片但无流式气泡，附加到最后一条 AI 消息
                    if (streamCitationDiv && streamCitationCount > 0) {
                        var lastAi = chatContainer.querySelector('.message.ai:last-of-type .bubble');
                        if (lastAi) lastAi.appendChild(streamCitationDiv);
                    }
                }

                // 如果出错/截断，追加提示
                if (streamError) {
                    const noteDiv = document.createElement('div');
                    noteDiv.style.cssText = 'margin-top:8px;font-size:12px;color:#f0a080;font-style:italic;';
                    noteDiv.textContent = streamError;
                    if (streamTextDiv) streamTextDiv.appendChild(noteDiv);
                }

                // 保存到对话历史
                conversation.push({ role: 'assistant', content: aiContent });
                await ChatHistoryManager.addMessage(currentMode, currentConversationId, 'assistant', aiContent);
                await renderHistorySidebar(currentMode);
            } else if (!streamError) {
                // 完全没收到内容且没报错
                renderMessage('ai', '喵呜...本喵走神了，再说一次喵~', null);
            }

            scrollToBottom();
            setInputEnabled(true);
        }

        // ===== 回喵码：猫咪微交互 + View Transition 接管 (Chrome) =====
        var backLink = document.querySelector('.back-link');
        if (backLink) {
            backLink.addEventListener('click', function(e) {
                e.preventDefault();
                var rect = this.getBoundingClientRect();
                var x = rect.left + rect.width / 2;
                var y = rect.top + rect.height / 2;
                var cat = document.createElement('span');
                cat.textContent = '🐱';
                cat.style.cssText = 'position:fixed;z-index:99999;pointer-events:none;font-size:28px;left:' + x + 'px;top:' + y + 'px;transform:translate(-50%,-50%) scale(0);opacity:0;transition:transform 0.18s cubic-bezier(0.4,0,0.2,1),opacity 0.18s ease;';
                document.body.appendChild(cat);
                requestAnimationFrame(function() {
                    cat.style.transform = 'translate(-50%,-50%) scale(1)';
                    cat.style.opacity = '0.85';
                });
                // 猫弹出后立即导航，View Transition 接管页面的丝滑过渡
                setTimeout(function() {
                    window.location.href = '/';
                }, 200);
            });
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        welcomeTips.addEventListener('click', function(e) { const span = e.target.closest('span'); if (span) { chatInput.value = span.textContent; chatInput.focus(); autoGrowTextarea(chatInput); } });

        // ===== Init =====
        (async function init() {
            await applyMode(currentMode);
            conversation = await loadConversationForMode(currentMode);
            if (conversation.length > 0) { welcomeCard.style.display = 'none'; for (const msg of conversation) renderMessage(msg.role, msg.content, null); }
            await renderHistorySidebar(currentMode);
        })();

        // Expose refresh for login callback
        window._refreshChatHistory = async function() {
            conversation = await loadConversationForMode(currentMode);
            rerenderChat(conversation);
            await renderHistorySidebar(currentMode);
        };


        document.getElementById('hist-new-btn').addEventListener('click', async () => { await newConversation(); showToast('已开始新对话喵~'); });

        if (!Auth.isLoggedIn()) { showAuthOverlay(); }
        else { hideAuthOverlay(); const user = Auth.getUser(); if (user) { updateSidebarUser(user); loadPrompts(); } }

        chatInput.focus();
        scrollToBottom();

        // 全站在线统计 — chat 访客也上报
        (function onlinePing() {
            fetch('/api/online-count').catch(function(){});
            setInterval(function() { fetch('/api/online-count').catch(function(){}); }, 30000);
        })();

        // ===== 设置管理器 =====
        var SETTINGS_KEY = 'miaosite-settings';
        var defaultSettings = {
            webSearch: { enabled: false, resultCount: 5, searchRegion: 'global', autoSearch: false },
            deepThinking: { enabled: false, showProcess: true, depth: 'medium' },
            appearance: { fontSize: 'medium', messageSpacing: 'normal', bubbleRadius: 14 },
            conversation: { contextLength: 20, catPersonality: 'clingy', autoTitle: true }
        };

        function loadSettings() {
            try { var s = localStorage.getItem(SETTINGS_KEY); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(defaultSettings)); }
            catch(e) { return JSON.parse(JSON.stringify(defaultSettings)); }
        }
        function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

        function getSetting(path) {
            var keys = path.split('.'); var val = currentSettings;
            for (var i = 0; i < keys.length; i++) { if (val === undefined) return undefined; val = val[keys[i]]; }
            return val;
        }
        function setSetting(path, value) {
            var keys = path.split('.'); var obj = currentSettings;
            for (var i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
            obj[keys[keys.length - 1]] = value;
            saveSettings(currentSettings);
            applyAppearanceSettings();
        }

        function applyAppearanceSettings() {
            var app = currentSettings.appearance;
            var scaleMap = { small: 0.875, medium: 1, large: 1.125 };
            var gapMap = { compact: '6px', normal: '12px', relaxed: '20px' };
            document.documentElement.style.setProperty('--font-scale', scaleMap[app.fontSize]);
            document.documentElement.style.setProperty('--msg-gap', gapMap[app.messageSpacing]);
            document.documentElement.style.setProperty('--bubble-radius', app.bubbleRadius + 'px');
            var brVal = document.getElementById('bubble-radius-value');
            if (brVal) brVal.textContent = app.bubbleRadius + 'px';
        }

        var settingsOverlay = document.getElementById('settings-overlay');
        var settingsBtn = document.getElementById('settings-btn');
        var settingsClose = document.getElementById('settings-close');

        function openSettings() { settingsOverlay.classList.add('open'); }
        function closeSettings() { settingsOverlay.classList.remove('open'); }

        settingsBtn.addEventListener('click', openSettings);
        settingsClose.addEventListener('click', closeSettings);
        settingsOverlay.addEventListener('click', function(e) {
            if (e.target === settingsOverlay) closeSettings();
        });

        function syncSettingsToDOM() {
            document.querySelectorAll('[data-key]').forEach(function(el) {
                var key = el.dataset.key;
                var val = getSetting(key);
                if (el.type === 'checkbox') { el.checked = !!val; }
                else if (el.tagName === 'SELECT') { el.value = val; }
                else if (el.type === 'range') { el.value = val; }
            });
            applyAppearanceSettings();
        }

        function bindSettingsEvents() {
            document.querySelectorAll('[data-key]').forEach(function(el) {
                el.addEventListener('change', function() {
                    var val;
                    if (this.type === 'checkbox') val = this.checked;
                    else if (this.type === 'range') val = parseInt(this.value);
                    else val = this.value;
                    setSetting(this.dataset.key, val);
                    syncToggleButtons();
                });
            });
        }

        function syncToggleButtons() {
            var webBtn = document.getElementById('toggle-web-search');
            var thinkBtn = document.getElementById('toggle-deep-think');
            if (currentSettings.webSearch.enabled) webBtn.classList.add('active');
            else webBtn.classList.remove('active');
            if (currentSettings.deepThinking.enabled) thinkBtn.classList.add('active');
            else thinkBtn.classList.remove('active');
        }

        document.getElementById('toggle-web-search').addEventListener('click', function() {
            var enabled = !currentSettings.webSearch.enabled;
            setSetting('webSearch.enabled', enabled);
            if (enabled) this.classList.add('active'); else this.classList.remove('active');
            showToast(enabled ? '已开启网页搜索 🌐' : '已关闭网页搜索');
        });
        document.getElementById('toggle-deep-think').addEventListener('click', function() {
            var enabled = !currentSettings.deepThinking.enabled;
            setSetting('deepThinking.enabled', enabled);
            if (enabled) this.classList.add('active'); else this.classList.remove('active');
            showToast(enabled ? '已开启深度思考 🧠' : '已关闭深度思考');
        });

        // 气泡圆角滑块实时预览
        document.getElementById('set-bubble-radius').addEventListener('input', function() {
            document.getElementById('bubble-radius-value').textContent = this.value + 'px';
            document.documentElement.style.setProperty('--bubble-radius', this.value + 'px');
        });

        var currentSettings = loadSettings();
        syncSettingsToDOM();
        bindSettingsEvents();
        syncToggleButtons();

        // 暴露给全局以便 sendMessage 使用
        window.getCurrentSettings = function() { return currentSettings; };

    })();
    </script>
</body>
</html>
