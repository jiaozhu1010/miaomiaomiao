<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵码生成器 - 极简快递单号条码生成</title>
    <!-- 引入 JsBarcode 生成条形码 -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --primary-color: #ffb74d;
            --bg-color: #f4f6f8;
            --box-bg: #ffffff;
            --text-color: #333333;
            --border-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            zoom: 1.1;
        }

        .container {
            background-color: var(--box-bg);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            align-self: flex-start;
            margin-top: 10vh; /* 留出空间给在顶部走动的小猫 */
            position: relative;
        }

        /* 漫步的小猫：绝对定位在容器顶部边缘 */
        .roaming-cat {
            position: absolute;
            top: -49px; /* 站在容器上方 */
            width: 50px;
            height: 50px;
            z-index: 10;
            animation: patrol 12s linear infinite;
        }

        /* 巡逻动画：从左走到右，转身，再走回来 */
        @keyframes patrol {
            0%   { left: 10px; transform: scaleX(1); }
            45%  { left: calc(100% - 60px); transform: scaleX(1); }
            50%  { left: calc(100% - 60px); transform: scaleX(-1); } /* 转身 */
            95%  { left: 10px; transform: scaleX(-1); }
            100% { left: 10px; transform: scaleX(1); } /* 转回来 */
        }

        /* 身体与腿部动画，使其走动时更自然 */
        .cat-body { animation: bodyBob 0.6s infinite alternate ease-in-out; }
        @keyframes bodyBob {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-3px); }
        }
        @keyframes legWalk1 {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
        }
        @keyframes legWalk2 {
            0%, 100% { transform: rotate(20deg); }
            50% { transform: rotate(-20deg); }
        }
        .leg-front { transform-origin: 30px 45px; animation: legWalk1 0.5s infinite linear; }
        .leg-back { transform-origin: 50px 45px; animation: legWalk2 0.5s infinite linear; }

        /* 顶部标题 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 26px;
            margin: 0;
            color: #444;
            letter-spacing: 2px;
        }

        /* 输入区 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 极简舒适版输入框样式 */
        textarea {
            width: 100%;
            height: 120px;
            padding: 16px; /* 增加内边距，让文字周围有足够的呼吸空间 */
            border: 2px solid #eef0f2;
            border-radius: var(--border-radius);
            font-family: "SF Mono", Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 16px; /* 字号放大，极其醒目 */
            font-weight: 500; /* 字重微微加粗，清晰有力 */
            letter-spacing: 1px; /* 舒适的字间距，不拥挤 */
            color: #2c3e50; /* 使用高级的深蓝灰，比纯黑更护眼舒服 */
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease; /* 丝滑的过渡动画 */
            background-color: #fafbfc; /* 默认极浅的背景色，与纯白卡片区分层级 */
        }

        /* 输入聚焦时的极简反馈 */
        textarea:focus {
            border-color: var(--primary-color);
            background-color: #ffffff; /* 聚焦时变纯白，突出当前操作区 */
            box-shadow: 0 0 0 4px rgba(255, 183, 77, 0.15); /* 简约柔和的焦点光环，不刺眼 */
        }

        textarea::placeholder {
            color: #a0aec0; /* 柔和的占位符颜色 */
        }

        /* 快捷输入按钮样式 - 激萌版 */
        .quick-input-tools {
            align-items: center;
        }
        
        .btn-quick {
            background-color: #fff3e0; /* 温暖的奶橘色背景 */
            color: #ff8a80;            /* 俏皮的猫爪粉文字 */
            border: 2px solid #ffcc80; /* 圆润的橘色边框 */
            padding: 6px 16px;
            border-radius: 20px;       /* 软乎乎的圆角 */
            font-size: 14px;
            /* 使用自带的可爱圆体字族，如果没有则回退到手写体 */
            font-family: "Comic Sans MS", "幼圆", "方正准圆简体", "TsukuARdGothic-Regular", cursive, sans-serif; 
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 0 #ffcc80; /* 立体按键的厚度阴影 */
            transition: all 0.1s ease;   /* 动画过渡变得更清脆 */
            outline: none;
        }

        .btn-quick:hover {
            background-color: #ffe0b2;
            transform: translateY(-2px); /* 悬浮时微微抬起 */
            box-shadow: 0 6px 0 #ffcc80; /* 悬浮时阴影加深 */
        }

        .btn-quick:active {
            transform: translateY(4px);  /* 按下时真实下陷 */
            box-shadow: 0 0 0 #ffcc80;   /* 按下时阴影消失，产生物理按压感 */
        }

        /* 工具栏：下拉框与按钮 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .select-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        select {
            padding: 8px 12px;
            border: 2px solid #eef0f2;
            border-radius: 8px;
            background-color: #fff;
            outline: none;
            cursor: pointer;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        select:focus { border-color: var(--primary-color); }

        .btn-clear {
            background-color: #ff6b6b;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
            outline: none;
        }

        .btn-clear:hover { background-color: #ff5252; }
        .btn-clear:active { transform: scale(0.96); }

        /* 条形码展示区（Grid 布局） */
        .barcode-output {
            margin-top: 30px;
            display: grid;
            gap: 20px;
            justify-items: center;
        }

        .cols-1 { grid-template-columns: 1fr; }
        .cols-2 { grid-template-columns: repeat(2, 1fr); }
        .cols-3 { grid-template-columns: repeat(3, 1fr); }

        .barcode-item {
            background: #fff;
            border: 1px dashed #ccc;
            border-radius: 8px;
            padding: 15px 10px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .barcode-item svg {
            max-width: 100%;
            height: auto;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 14px;
        }

        /* 移动端自适应：确保手机上强制显示为1列，不会挤压变形 */
        @media (max-width: 600px) {
            .barcode-output.cols-2, .barcode-output.cols-3 {
                grid-template-columns: 1fr;
            }
            .container { padding: 20px; margin-top: 15vh; }
        }

                        /* 赛博铜木鱼样式 */
        .muyu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            user-select: none;
            position: relative;
            padding: 10px;
        }
        .muyu-icon {
            width: 60px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #e6b981, #b87333, #8b4513);
            border-radius: 50% 50% 40% 40% / 60% 60% 30% 30%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3), inset 0 -3px 5px rgba(0,0,0,0.4);
            position: relative;
            transition: transform 0.05s ease;
        }
        .muyu-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 10%;
            width: 80%;
            height: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
        }
        .muyu-icon:active {
            transform: scale(0.9) translateY(2px);
        }
        .muyu-count {
            margin-top: 5px;
            font-size: 12px;
            color: #ff8a80;
            font-weight: bold;
            font-family: monospace;
        }
        .merit-plus {
            position: absolute;
            top: -10px;
            color: #ffcc80;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
        }

        .main-split-layout {
            display: flex;
            gap: 25px;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            align-items: flex-start;
        }
        
        .generator-main-content {
            flex: 2;
            background: #ffffff;
            border: 3px solid #ffcc80;
            border-radius: 20px;
            box-shadow: 0 6px 0 #ffcc80;
            padding: 25px;
        }
        /* 聊天室内嵌样式 */
        .chat-header {
            background: #fff3e0;
            padding: 12px 15px;
            border-bottom: 3px solid #ffcc80;
            color: #ff8a80;
            font-weight: bold;
        }
        .chat-header h3 { margin: 0; font-size: 16px; }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse; /* 新消息在最下面，自动滚动 */
            gap: 10px;
            background: #fafafa;
        }
        .chat-loading { text-align: center; color: #999; font-size: 13px; margin-top: 20px; }
        .msg-bubble {
            background: #fff3e0;
            border: 2px solid #ffe0b2;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 85%;
            align-self: flex-start;
            animation: bubbleIn 0.25s ease-out;
        }
        @keyframes bubbleIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-meta { font-size: 11px; color: #ff8a80; font-weight: bold; margin-bottom: 3px; display: flex; justify-content: space-between; gap: 10px; }
        .msg-time { color: #b0bec5; font-weight: normal; }
        .msg-text { font-size: 13.5px; color: #2c3e50; word-break: break-all; }
        .chat-footer {
            padding: 12px;
            background: #fff3e0;
            border-top: 3px solid #ffcc80;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #chat-nick {
            border: 2px solid #ffcc80;
            border-radius: 8px;
            padding: 5px 8px;
            font-size: 12px;
            background: #fff;
            color: #ff8a80;
        }
        .chat-input-row { display: flex; gap: 6px; }
        #chat-msg {
            flex: 1;
            border: 2px solid #ffcc80;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
        }
        #chat-send-btn {
            background: #ff8a80;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #e57373;
            transition: all 0.05s;
        }
        #chat-send-btn:active { transform: translateY(3px); box-shadow: none; }

        /* 窄屏手机适配：自动变成上下叠放 */
        @media (max-width: 768px) {
            .main-split-layout { flex-direction: column; }
            .chat-sidebar { max-width: 100%; width: 100%; height: 350px; position: static; }
        }

        /* =========================
        喵喵大厅悬浮按钮
        ========================= */

        .floating-chat-btn {
            position: fixed;
            right: 25px;
            bottom: 25px;
            width: 72px;
            height: 72px;
            background: linear-gradient(145deg, #ffd180, #ffb74d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            cursor: pointer;
            z-index: 9999;
            border: 4px solid #fff3e0;

            box-shadow:
                0 8px 20px rgba(255,183,77,0.45),
                0 0 20px rgba(255,183,77,0.35);

            animation:
                floatingBreath 2.8s ease-in-out infinite,
                floatingBounce 4s ease-in-out infinite;

            transition: all 0.25s ease;
        }

        .floating-chat-btn::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid rgba(255,183,77,0.4);
            animation: pulseRing 2s infinite;
        }

        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        .floating-chat-btn:hover {
            transform: scale(1.12) rotate(8deg);
        }

        .floating-chat-btn:active {
            transform: scale(0.92);
        }

        /* 呼吸动画 */
        @keyframes floatingBreath {
            0%,100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.06);
            }
        }

        /* 漂浮动画 */
        @keyframes floatingBounce {
            0%,100% {
                translate: 0 0;
            }
            50% {
                translate: 0 -6px;
            }
        }

        /* =========================
        喵喵大厅悬浮窗
        ========================= */

        .floating-chat-window {
            position: fixed;
            right: 25px;
            bottom: 115px;

            width: 360px;
            height: 520px;

            background: #ffffff;

            border: 3px solid #ffcc80;
            border-radius: 24px;

            box-shadow:
                0 12px 40px rgba(0,0,0,0.15),
                0 0 30px rgba(255,183,77,0.15);

            overflow: hidden;

            display: flex;
            flex-direction: column;

            z-index: 9998;

            opacity: 0;
            pointer-events: none;

            transform:
                translateY(30px)
                scale(0.85);

            transition:
                all 0.35s cubic-bezier(.2,.8,.2,1);
        }

        /* 打开状态 */
        .floating-chat-window.show {
            opacity: 1;
            pointer-events: auto;

            animation: catPopup 0.45s cubic-bezier(.18,1.25,.4,1);

            transform:
                translateY(0)
                scale(1);
        }

        @keyframes catPopup {
                0% {
                    opacity: 0;
                    transform:
                        translateY(60px)
                        scale(0.6)
                        rotate(-8deg);
                }
                60% {
                    opacity: 1;
                    transform:
                        translateY(-10px)
                        scale(1.04)
                        rotate(2deg);
                }
                100% {
                    opacity: 1;
                    transform:
                        translateY(0)
                        scale(1)
                        rotate(0deg);
                }
            }

        /* 顶部 */
        .floating-chat-header {
            height: 60px;

            background: linear-gradient(135deg,#fff3e0,#ffe0b2);

            border-bottom: 3px solid #ffcc80;

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 0 18px;

            color: #ff8a80;
            font-weight: bold;
            font-size: 16px;
        }

        .chat-title-area {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-title {
            font-size: 16px;
            font-weight: bold;
        }

        .online-count {
            font-size: 12px;
            color: #ff8a80;
            opacity: 0.85;

            animation: onlineGlow 2s infinite ease-in-out;
        }

        @keyframes onlineGlow {

            0%,100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* 关闭按钮 */
        #close-chat-btn {
            width: 34px;
            height: 34px;

            border: none;
            border-radius: 50%;

            background: #ff8a80;
            color: white;

            font-size: 20px;
            cursor: pointer;

            transition: all 0.2s ease;
        }

        #close-chat-btn:hover {
            transform: rotate(90deg) scale(1.1);
        }

        /* 聊天区 */
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #fffaf5;
        }

        /* 手机端 */
        @media (max-width: 768px) {

            .floating-chat-window {
                width: calc(100vw - 24px);
                height: 70vh;

                right: 12px;
                bottom: 95px;
            }

            .floating-chat-btn {
                right: 18px;
                bottom: 18px;
                overflow: visible;
            }
        }
        .floating-chat-btn::before {
            content: '🐈';
            position: absolute;

            top: -18px;
            right: -10px;

            font-size: 22px;

            animation: catTail 1.8s infinite ease-in-out;
        }

        @keyframes catTail {

            0%,100% {
                transform: rotate(-8deg);
            }

            50% {
                transform: rotate(10deg);
            }
        }

            
    </style>
</head>
<body>
    
    <div class="container">
        <!-- 漫步的小猫 SVG -->
        <svg class="roaming-cat" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <g class="cat-body">
                <!-- 尾巴 -->
                <path d="M 25 65 Q 10 50 15 30" stroke="#ffb74d" stroke-width="6" stroke-linecap="round" fill="none"/>
                <!-- 身体 -->
                <rect x="25" y="45" width="40" height="22" rx="11" fill="#ffb74d" />
                <!-- 腿部 (带走动动画) -->
                <line class="leg-front" x1="35" y1="65" x2="35" y2="80" stroke="#ffb74d" stroke-width="6" stroke-linecap="round"/>
                <line class="leg-back" x1="55" y1="65" x2="55" y2="80" stroke="#ffb74d" stroke-width="6" stroke-linecap="round"/>
                <!-- 头部 -->
                <circle cx="70" cy="45" r="16" fill="#ffb74d" />
                <!-- 耳朵 -->
                <polygon points="60,35 63,18 72,32" fill="#ffb74d" />
                <polygon points="72,32 80,18 84,35" fill="#ffb74d" />
                <!-- 脸部细节 -->
                <circle cx="73" cy="43" r="2.5" fill="#333" />
                <circle cx="83" cy="43" r="2.5" fill="#333" />
                <!-- 腮红 -->
                <circle cx="68" cy="48" r="3" fill="#ff8a80" opacity="0.8" />
                <circle cx="86" cy="48" r="3" fill="#ff8a80" opacity="0.8" />
            </g>
        </svg>

        <div class="header-container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1>喵码生成器</h1>
            <div class="muyu-container" id="muyu-btn">
                <div class="muyu-icon"></div>
                <div class="muyu-count">全服功德: <span id="global-count">0</span></div>
            </div>
        </div>

        <div class="input-group">
            <div class="quick-input-tools" style="display: flex; gap: 10px; margin-bottom: -5px;">
                <button class="btn-quick" id="btn-dpk">DPK</button>
                <button class="btn-quick" id="btn-dpl">DPL</button>
            </div>
            <textarea id="barcode-input" placeholder="请输入快递单号...&#10;支持换行输入多个单号，实时生成，快捷好用！"></textarea>
            
            <div class="toolbar">
                <div class="select-group">
                    <label for="col-select">排列方式：</label>
                    <select id="col-select">
                        <option value="1">1 列排列</option>
                        <option value="2" selected>2 列排列</option> <!-- 默认选中两列 -->
                        <option value="3">3 列排列</option>
                    </select>
                 </div>
                    <div style="display: flex; align-items: center;">
                        <button class="btn-clear" id="copy-btn" style="background-color: #ffb74d; margin-right: 4px;">复制单号</button>
                        <button class="btn-clear" id="clear-btn">清空输入</button>
                    </div>
            </div>
        </div>            

        <!-- 输出区默认设置为 2 列样式 -->
        <div id="barcode-output" class="barcode-output cols-2"></div>
    </div>

    <!-- 喵喵大厅悬浮按钮 -->
    <div class="floating-chat-btn" id="floating-chat-btn">   🐾

    </div>
    <!-- 喵喵大厅悬浮窗 -->
    <div class="floating-chat-window" id="floating-chat-window">

        <div class="floating-chat-header" id="chat-header-drag">

            <div class="chat-title-area">
                <span class="chat-title">
                    🐈 喵喵大厅
                </span>
                <span class="online-count" id="online-count">
                    在线 1 只猫
                </span>
            </div>
            <button id="close-chat-btn">×</button>
        </div>

        <div class="chat-messages" id="chat-box">
            <div class="chat-loading">正在接入喵星信号...</div>
        </div>

        <div class="chat-footer">
            <input type="text" id="chat-nick" placeholder="昵称: 随机猫咪" maxlength="10">

            <div class="chat-input-row">
                <input type="text" id="chat-msg" placeholder="说点什么吧..." maxlength="100">
                <button id="chat-send-btn">发射</button>
            </div>
        </div>

    </div>


    <script>
        const inputArea = document.getElementById('barcode-input');
        const outputArea = document.getElementById('barcode-output');
        const colSelect = document.getElementById('col-select');
        const clearBtn = document.getElementById('clear-btn');
        const btnDpk = document.getElementById('btn-dpk');
        const btnDpl = document.getElementById('btn-dpl');

        // 通用的快捷输入函数
        function insertPrefix(prefix) {
            // 如果文本框已经有内容，且最后不是换行符，则先加个换行再插入
            if (inputArea.value.length > 0 && !inputArea.value.endsWith('\n')) {
                inputArea.value += '\n' + prefix;
            } else {
                inputArea.value += prefix;
            }
            // 保持焦点并实时渲染条码
            inputArea.focus();
            renderBarcodes();
        }
        // 绑定点击事件
        btnDpk.addEventListener('click', () => insertPrefix('DPK'));
        btnDpl.addEventListener('click', () => insertPrefix('DPL'));

                function renderBarcodes() {
            outputArea.innerHTML = '';
            
            const lines = inputArea.value.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            lines.forEach(text => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'barcode-item';
                
                const svgNode = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                itemDiv.appendChild(svgNode);
                outputArea.appendChild(itemDiv);

                try {
                    JsBarcode(svgNode, text, {
                        format: "CODE128",
                        width: 2,
                        height: 60,
                        displayValue: true,
                        // === 护眼且美观的精致配置 ===
                        fontSize: 16,         // 字号调小到 16，比例更精致秀气
                        fontOptions: "bold",  // 保持微加粗，确保较小字号下的清晰度
                        font: "monospace",    // 坚持使用等宽字体，数字排列严谨美观
                        textMargin: 6,        // 配合小字号微调间距，整体视觉更紧凑
                        lineColor: "#000000", // 换成柔和的高级板岩灰，彻底告别纯黑的刺眼感
                        // ===========================
                        margin: 10,
                        background: "transparent"
                    });
                } catch (error) {
                    itemDiv.innerHTML = `<span class="error-msg">无法生成: 包含无效字符 (${text})</span>`;
                }
            });
        }

        inputArea.addEventListener('input', renderBarcodes);

        colSelect.addEventListener('change', (e) => {
            const cols = e.target.value;
            outputArea.className = `barcode-output cols-${cols}`;
        });

        // 1. 绑定新按钮的变量
        const copyBtn = document.getElementById('copy-btn');
        // 2. 实现一键纯文本复制逻辑
        copyBtn.addEventListener('click', () => {
            if (!inputArea.value.trim()) {
                alert('没有可复制的单号喵~');
                return;
            }
            // 使用剪贴板 API 复制文本框内的纯文本
            navigator.clipboard.writeText(inputArea.value).then(() => {
                const originalText = copyBtn.innerText;
                const originalBg = copyBtn.style.backgroundColor;
                // 变成绿色并提示成功
                copyBtn.innerText = '已复制！';
                copyBtn.style.backgroundColor = '#81c784'; 
                // 1.2 秒后恢复原状
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.backgroundColor = originalBg; 
                }, 1200);
            }).catch(err => {
                alert('复制失败，请手动选择复制');
            });
        });
        
        clearBtn.addEventListener('click', () => {
            inputArea.value = '';
            renderBarcodes();
            inputArea.focus();
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const muyuBtn = document.getElementById('muyu-btn');
    const globalCountSpan = document.getElementById('global-count');
    let localClicks = 0;
    let syncTimer = null;
    let currentGlobalCount = 0;

    // 1. 网页刚打开时，获取全服总数
    fetch('/.netlify/functions/muyu')
        .then(res => res.json())
        .then(data => {
            currentGlobalCount = data.count || 0;
            globalCountSpan.innerText = currentGlobalCount;
        })
        .catch(err => console.error('获取初始功德失败', err));

    // 2. 点击木鱼时的本地特效
    muyuBtn.addEventListener('click', (e) => {
        localClicks++;
        currentGlobalCount++;
        globalCountSpan.innerText = currentGlobalCount;

        // 飘字动画（铜制木鱼敲击的“咚”字）
        const plus = document.createElement('div');
        plus.className = 'merit-plus';
        plus.innerText = '咚 +1';
        
        const rect = muyuBtn.getBoundingClientRect();
        const offsetX = (Math.random() - 0.5) * 20;
        plus.style.left = `calc(50% + ${offsetX}px)`;
        muyuBtn.appendChild(plus);

        setTimeout(() => plus.remove(), 800);

        // 3. 防抖打包：每隔1秒钟，把积攒的点击数发送给 Netlify 后端
        clearTimeout(syncTimer);
        syncTimer = setTimeout(() => {
            if (localClicks > 0) {
                const clicksToSend = localClicks;
                localClicks = 0; 
                
                fetch('/.netlify/functions/muyu', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: clicksToSend })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.count !== undefined) {
                        currentGlobalCount = data.count;
                        globalCountSpan.innerText = currentGlobalCount;
                    }
                })
                .catch(err => console.error('同步功德失败', err));
            }
        }, 1000);
    });
});
</script>
        <script>
document.addEventListener('DOMContentLoaded', () => {
    const chatBox = document.getElementById('chat-box');
    const chatNickInput = document.getElementById('chat-nick');
    const chatMsgInput = document.getElementById('chat-msg');
    const chatSendBtn = document.getElementById('chat-send-btn');
    const floatingChatBtn = document.getElementById('floating-chat-btn');
    const floatingChatWindow = document.getElementById('floating-chat-window');
    const closeChatBtn = document.getElementById('close-chat-btn');
    const chatHeaderDrag = document.getElementById('chat-header-drag');

    // 1. 随一个可爱的临时匿名账号
    const catNames = ['奶橘喵', '起司大花', '傲娇布偶', '无敌三花', '熬夜黑猫', '打包大麦', '圆滚滚英短'];
    const randomNick = catNames[Math.floor(Math.random() * catNames.length)] + '_' + Math.floor(Math.random() * 900 + 100);
    chatNickInput.placeholder = `昵称: ${randomNick}`;

    // 2. 核心：从云端拉取评论列表
    function fetchChats() {
        fetch('/.netlify/functions/chat')
            .then(res => res.json())
            .then(data => {
                if (!data.messages) return;
                
                // 清空旧数据
                chatBox.innerHTML = '';
                
                if (data.messages.length === 0) {
                    chatBox.innerHTML = '<div class="chat-loading">大厅空荡荡，快来抢沙发喵！</div>';
                    return;
                }

                // 渲染消息泡沫
                data.messages.forEach(msg => {
                    const bubble = document.createElement('div');
                    bubble.className = 'msg-bubble';
                    
                    // 安全过滤，防止恶搞脚本注入
                    const safeNick = msg.nickname.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const safeContent = msg.content.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                    bubble.innerHTML = `
                        <div class="msg-meta">
                            <span>🐱 ${safeNick}</span>
                            <span class="msg-time">${msg.time}</span>
                        </div>
                        <div class="msg-text">${safeContent}</div>
                    `;
                    chatBox.appendChild(bubble);
                });
            })
            .catch(err => console.error('加载大厅消息失败', err));
    }

    // 3. 核心：发射发送留言
    function sendChat() {
        const content = chatMsgInput.value.trim();
        if (!content) return;

        // 如果用户没填名字，就用刚才随出来的可爱名字
        const nickname = chatNickInput.value.trim() || randomNick;

        chatSendBtn.disabled = true;
        chatSendBtn.innerText = '喵..';

        fetch('/.netlify/functions/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nickname, content })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                chatMsgInput.value = ''; // 清空输入框
                fetchChats(); // 立刻刷新
            }
        })
        .catch(err => console.error('发射失败', err))
        .finally(() => {
            chatSendBtn.disabled = false;
            chatSendBtn.innerText = '发射';
        });
    }

    // 4. 事件监听（点击按钮与回车发送）
    chatSendBtn.addEventListener('click', sendChat);
    chatMsgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendChat();
    });

    // 5. 立即执行并在后台每 3 秒悄悄刷新一次
    fetchChats();
    setInterval(fetchChats, 3000);

        /* =========================
    在线人数模拟
    ========================= */

    const onlineCount = document.getElementById('online-count');

    let currentOnline = Math.floor(Math.random() * 15) + 8;

    function updateOnlineCount() {

        const fluctuation = Math.floor(Math.random() * 3) - 1;

        currentOnline += fluctuation;

        if (currentOnline < 5) currentOnline = 5;
        if (currentOnline > 99) currentOnline = 99;

        onlineCount.innerText = `在线 ${currentOnline} 只猫`;
    }

    updateOnlineCount();
    setInterval(updateOnlineCount, 4000);

    // 打开喵喵大厅
    floatingChatBtn.addEventListener('click', () => {
        floatingChatWindow.classList.add('show');
    });

    // 关闭喵喵大厅
    closeChatBtn.addEventListener('click', () => {
        floatingChatWindow.classList.remove('show');
    });

    /* =========================
    悬浮窗拖动功能
    ========================= */

    let isDragging = false;

    let offsetX = 0;
    let offsetY = 0;

    chatHeaderDrag.addEventListener('mousedown', (e) => {

        isDragging = true;

        const rect = floatingChatWindow.getBoundingClientRect();

        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;

        floatingChatWindow.style.transition = 'none';
    });

    document.addEventListener('mousemove', (e) => {

        if (!isDragging) return;

        floatingChatWindow.style.left = `${e.clientX - offsetX}px`;
        floatingChatWindow.style.top = `${e.clientY - offsetY}px`;

        floatingChatWindow.style.right = 'auto';
        floatingChatWindow.style.bottom = 'auto';
    });

    document.addEventListener('mouseup', () => {

        isDragging = false;

        floatingChatWindow.style.transition =
            'all 0.35s cubic-bezier(.2,.8,.2,1)';
    });
});


</script>
