    <script>
    (function() {
        var reloadToken = sessionStorage.getItem('miaosite_force_reload_token');
        if (reloadToken) sessionStorage.removeItem('miaosite_force_reload_token');
        window.__miaositeForceReloadToken = reloadToken || '';

        window.miaositeCacheBust = function(url) {
            if (!url || url.indexOf('data:') === 0 || url.indexOf('blob:') === 0) return url;
            if (!window.__miaositeForceReloadToken) return url;
            var nextUrl = new URL(url, window.location.href);
            if (nextUrl.origin !== window.location.origin) return url;
            nextUrl.searchParams.set('__miaosite_force_reload', window.__miaositeForceReloadToken);
            return nextUrl.pathname + nextUrl.search + nextUrl.hash;
        };
    })();
    </script>
