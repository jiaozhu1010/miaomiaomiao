    var TUT_PROGRESS_KEY = 'miaosite_python_progress';
    var TUT_LAST_DAY_KEY = 'miaosite_python_last_day';
    function getTutorialProgress() {
        try { return JSON.parse(localStorage.getItem(TUT_PROGRESS_KEY) || '{}'); } catch(e) { return {}; }
    }
    function setTutorialProgress(p) { localStorage.setItem(TUT_PROGRESS_KEY, JSON.stringify(p)); }
    function getDayProgress(dayNum) { return getTutorialProgress()[String(dayNum)] || 'none'; }
    function markDayProgress(dayNum, status) { var p = getTutorialProgress(); p[String(dayNum)] = status; setTutorialProgress(p); syncTutorialProgressToServer(p); }
    function getLastReadDay() {
        try { var d = parseInt(localStorage.getItem(TUT_LAST_DAY_KEY)); return isNaN(d) ? null : d; } catch(e) { return null; }
    }
    function setLastReadDay(dayNum) {
        if (dayNum != null) { try { localStorage.setItem(TUT_LAST_DAY_KEY, String(dayNum)); } catch(e) {} }
    }
    var _tutSyncTimer = null;
    function syncTutorialProgressToServer(p) {
        if (!Auth.isLoggedIn()) return;
        clearTimeout(_tutSyncTimer);
        _tutSyncTimer = setTimeout(async function() {
            try { await Auth.fetch('/api/python-tutorial/progress', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({progress:p}) }); } catch(_) {}
        }, 1500);
    }
    async function loadTutorialProgressFromServer() {
        if (!Auth.isLoggedIn()) return;
        try {
            var res = await Auth.fetch('/api/python-tutorial/progress');
            if (!res.ok) return;
            var serverP = await res.json();
            var localP = getTutorialProgress();
            var merged = Object.assign({}, serverP, localP);
            setTutorialProgress(merged);
            if (Object.keys(serverP).length) syncTutorialProgressToServer(merged);
        } catch(_) {}
    }

    // localStorage 持久化教程缓存（页面刷新后秒开）
    function getTutCache() {
        try { return JSON.parse(localStorage.getItem(TUT_CACHE_KEY) || '{}'); } catch(e) { return {}; }
    }
    function setTutCache(cache) {
        try { localStorage.setItem(TUT_CACHE_KEY, JSON.stringify(cache)); } catch(e) { /* quota exceeded, skip */ }
    }
    // 初始化缓存时从 localStorage 恢复
    (function restoreTutCache() {
        var saved = getTutCache();
        var count = 0;
        for (var k in saved) { if (saved.hasOwnProperty(k)) { _tutContentCache[k] = saved[k]; count++; } }
        if (count > 0) { /* 静默恢复，不输出日志 */ }
    })();
    // 保存缓存到 localStorage（每次获取新内容后调用）
    function persistTutCache(dayNum, data) {
        _tutContentCache[dayNum] = data;
        // 限制缓存条目数（保留最近 20 篇，约 190KB）
        var cache = getTutCache();
        cache[String(dayNum)] = data;
        var keys = Object.keys(cache);
        if (keys.length > 20) {
            keys.sort(function(a,b) { return parseInt(b) - parseInt(a); });
            var newCache = {};
            keys.slice(0, 20).forEach(function(k) { newCache[k] = cache[k]; });
            cache = newCache;
        }
        setTutCache(cache);
    }
    // 预加载相邻教程（后台静默加载下一篇）
    function preloadAdjacentDay(nextDay) {
        if (!nextDay || _tutContentCache[nextDay.day]) return;
        fetch('/api/python-tutorial/content?day=' + nextDay.day)
            .then(function(r) { if (r.ok) return r.json(); throw new Error(); })
            .then(function(data) { persistTutCache(nextDay.day, data); })
            .catch(function() { /* 静默失败 */ });
    }

    // ===== GSAP 教程目录动画 =====
    var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
    var reduceMotion = prefersReducedMotion.matches;
    prefersReducedMotion.addEventListener('change', function(e) { reduceMotion = e.matches; });
    function safeTutProps(props) {
        if (!reduceMotion) return props;
        var safe = {};
        if (props.opacity !== undefined) safe.opacity = props.opacity;
        safe.duration = Math.min(props.duration || 0.2, 0.2);
        safe.ease = 'power1.out';
        return safe;
    }
    // 教程动画状态标志
    state._tutSidebarAnimatedEntrance = false;
    state._tutFirstWobbleDone = false;
    var _tutPrevDotStates = {};
    var tutSyncPulseTween = null;
    var _tutLoadGen = 0;
    var _tutAbortController = null;
    var _tutContentCache = {};
    var TUT_CACHE_KEY = 'miaosite_tut_cache_v2';  // localStorage 持久化缓存键

    // ===== GSAP 模式切换动画 =====
    var modeIndicator = null;
    var modeAnimating = false;

    function initModeTabs() {
        modeIndicator = document.getElementById('mode-tabs-indicator');
        if (!modeIndicator) return;
        var gsapOk = typeof gsap !== 'undefined';
        var activeTab = document.querySelector('.mode-tab.active');
        if (activeTab && gsapOk) {
            gsap.set(modeIndicator, {
                x: activeTab.offsetLeft - 6,
                width: activeTab.offsetWidth
            });
        }
        // 标签悬停微交互
        document.querySelectorAll('.mode-tab').forEach(function(tab) {
            tab.addEventListener('mouseenter', function() {
                if (tab.classList.contains('active') || modeAnimating) return;
                gsap.to(tab, { scale: 1.04, duration: 0.3, ease: 'back.out(1.7)' });
            });
            tab.addEventListener('mouseleave', function() {
                if (tab.classList.contains('active') || modeAnimating) return;
                gsap.to(tab, { scale: 1, duration: 0.3, ease: 'power2.out' });
            });
            tab.addEventListener('mousedown', function() {
                gsap.to(tab, { scale: 0.95, duration: 0.1, ease: 'power2.in' });
            });
            tab.addEventListener('mouseup', function() {
                gsap.to(tab, { scale: tab.classList.contains('active') ? 1 : 1.04, duration: 0.25, ease: 'back.out(1.7)' });
            });
        });

        // 窗口大小变化时重新定位指示器
        var resizeDebounce = null;
        window.addEventListener('resize', function() {
            clearTimeout(resizeDebounce);
            resizeDebounce = setTimeout(function() {
                var active = document.querySelector('.mode-tab.active');
                if (active && modeIndicator && typeof gsap !== 'undefined') {
                    var tabsContainer = document.getElementById('mode-tabs');
                    var containerLeft = tabsContainer.getBoundingClientRect().left;
                    gsap.set(modeIndicator, {
                        x: active.getBoundingClientRect().left - containerLeft - 6 + tabsContainer.scrollLeft,
                        width: active.offsetWidth
                    });
                }
            }, 150);
        });
    }

    function animateModeIndicator(targetTab, callback) {
        if (!modeIndicator) { if (callback) callback(); return; }
        var tabsContainer = document.getElementById('mode-tabs');
        var containerLeft = tabsContainer.getBoundingClientRect().left;
        var targetLeft = targetTab.getBoundingClientRect().left;
        var targetWidth = targetTab.offsetWidth;
        gsap.to(modeIndicator, {
            x: targetLeft - containerLeft - 6 + tabsContainer.scrollLeft,
            width: targetWidth,
            duration: 0.5,
            ease: 'power3.inOut',
            overwrite: 'auto',
            onComplete: callback || null
        });
    }

    function switchMode(mode) {
        if (state.mode === mode || modeAnimating) return;
        modeAnimating = true;
        state.mode = mode;

        // 更新 tab active 状态
        var targetTab = null;
        document.querySelectorAll('.mode-tab').forEach(function(t) {
            var isActive = t.dataset.mode === mode;
            t.classList.toggle('active', isActive);
            if (isActive) targetTab = t;
        });

        var articleMode = document.getElementById('article-mode');
        var tutorialMode = document.getElementById('tutorial-mode');
        var articleSidebar = document.getElementById('content-sidebar');

        // 内容区 GSAP 过渡动画
        var leavingEl = mode === 'articles' ? tutorialMode : articleMode;
        var enteringEl = mode === 'articles' ? articleMode : tutorialMode;
        // article-mode 使用 display:contents，不支持 transform；仅用 opacity
        var enteringIsContents = enteringEl === articleMode;
        var leavingIsContents = leavingEl === articleMode;

        // 预先把进入元素设为不可见（防止闪现）
        gsap.set(enteringEl, { opacity: 0 });

        // 1. 先让离开的内容淡出
        var leaveVars = { opacity: 0, duration: 0.2, ease: 'power2.in' };
        if (!leavingIsContents) leaveVars.y = -6;
        gsap.to(leavingEl, leaveVars);

        // 2. 延迟切换 DOM 可见性后淡入
        gsap.to(leavingEl, {
            duration: 0.2,
            onComplete: function() {
                // 切换 DOM 可见性
                if (mode === 'articles') {
                    tutorialMode.classList.add('hidden');
                    articleMode.classList.remove('hidden');
                } else {
                    articleMode.classList.add('hidden');
                    tutorialMode.classList.remove('hidden');
                }

                // 3. 进入的内容淡入
                var enterVars = {
                    opacity: 1,
                    duration: 0.4,
                    ease: 'power2.out',
                    onComplete: function() {
                        gsap.set(enteringEl, { clearProps: 'opacity' });
                    }
                };
                if (!enteringIsContents) {
                    enterVars.y = 0;
                    gsap.set(enteringEl, { y: 6 });
                }
                gsap.to(enteringEl, enterVars);
            }
        });

        if (mode === 'articles') {
            document.body.classList.remove('tutorial-active');
            // 清理教程滚动监听
            if (tutReadTracker) { document.removeEventListener('scroll', tutReadTracker); tutReadTracker = null; }
            // 恢复文章侧边栏原始内容
            if (state._sidebarBackup) {
                articleSidebar.innerHTML = state._sidebarBackup;
                state._sidebarBackup = null;
            }
            // 恢复文章列表：清除内联样式，让 CSS 接管
            var listEl = document.getElementById('article-list');
            var pagEl = document.getElementById('pagination');
            var rcEl = document.getElementById('result-count');
            var btnCreate = document.getElementById('btn-create');
            var detailEl = document.getElementById('article-detail');
            var editorEl = document.getElementById('editor-view');
            if (listEl) listEl.classList.remove('hidden');
            if (pagEl) pagEl.style.display = '';
            if (rcEl) rcEl.style.display = '';
            if (btnCreate) btnCreate.style.display = '';
            if (detailEl) detailEl.classList.remove('show');
            if (editorEl) editorEl.classList.remove('show');
            // 始终回到列表视图
            state.view = 'list';
            showView('list');
            // 如果文章未加载，重新加载
            if (!state.articles || state.articles.length === 0) loadArticles();
        } else {
            document.body.classList.add('tutorial-active');
            // 隐藏文章元素
            var detailEl2 = document.getElementById('article-detail');
            var editorEl2 = document.getElementById('editor-view');
            var listEl2 = document.getElementById('article-list');
            var pagEl2 = document.getElementById('pagination');
            var rcEl2 = document.getElementById('result-count');
            var btnCreate2 = document.getElementById('btn-create');
            if (detailEl2) detailEl2.classList.remove('show');
            if (editorEl2) editorEl2.classList.remove('show');
            if (listEl2) listEl2.classList.add('hidden');
            if (pagEl2) pagEl2.style.display = 'none';
            if (rcEl2) rcEl2.style.display = 'none';
            if (btnCreate2) btnCreate2.style.display = 'none';
            // 保存文章侧边栏原始内容，替换为教程目录
            if (!state._sidebarBackup) {
                state._sidebarBackup = articleSidebar.innerHTML;
            }
            articleSidebar.innerHTML = '<div class="glass-card sidebar-card">'
                + '<h3>🔍 搜索</h3>'
                + '<div class="wiki-search-wrap">'
                + '<input class="wiki-search-input" type="text" id="tut-search-input" placeholder="搜索教程..." oninput="onTutorialSearch()">'
                + '<button class="wiki-search-btn" onclick="onTutorialSearch()">🔍</button>'
                + '</div></div>'
                + '<h3 style="font-size:14px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 6px 4px;">📑 目录</h3>'
                + '<div id="tut-section-list"></div>';
            // 始终重新加载教程数据
            checkTutorialStatus();
        }

        // GSAP 滑动指示器 (带完成回调重置锁)
        if (targetTab) {
            animateModeIndicator(targetTab, function() {
                modeAnimating = false;
            });
        } else {
            modeAnimating = false;
        }
    }

    async function checkTutorialStatus() {
        try {
            var res = await fetch('/api/python-tutorial/status');
            var data = await res.json();
            if (data.synced && data.totalDays > 0) {
                state.tutorialLoaded = true;
                var w = document.getElementById('tutorial-welcome');
                if (w) w.style.display = 'none';
                await loadTutorialStructure();
                // 恢复上次阅读位置；若无记录则从第一天开始
                if (state.tutorialStructure && state.tutorialStructure.sections.length > 0) {
                    var lastDay = getLastReadDay();
                    if (lastDay) {
                        loadTutorialContent(lastDay);
                    } else {
                        var firstSection = state.tutorialStructure.sections[0];
                        if (firstSection.days && firstSection.days.length > 0) {
                            loadTutorialContent(firstSection.days[0].day);
                        }
                    }
                }
            } else {
                // 未同步 — 启动按钮呼吸脉冲
                startSyncPulse();
            }
        } catch (err) { console.warn('检查教程状态失败:', err); }
    }

    function startSyncPulse() {
        if (reduceMotion) return;
        // 大同步按钮脉冲
        var bigBtn = document.getElementById('btn-sync-big');
        if (bigBtn && !tutSyncPulseTween) {
            tutSyncPulseTween = gsap.to(bigBtn, { boxShadow: '0 0 0 8px rgba(255,159,67,0)', duration: 2, ease: 'sine.inOut', repeat: -1, yoyo: true });
            gsap.set(bigBtn, { boxShadow: '0 0 0 0px rgba(255,159,67,0.2)' });
        }
        // 小同步按钮脉冲
        var smallBtn = document.getElementById('btn-sync-small');
        if (smallBtn) {
            gsap.to(smallBtn, { boxShadow: '0 0 0 8px rgba(255,159,67,0)', duration: 2, ease: 'sine.inOut', repeat: -1, yoyo: true, overwrite: 'auto' });
            gsap.set(smallBtn, { boxShadow: '0 0 0 0px rgba(255,159,67,0.15)' });
        }
    }

    function killSyncPulse() {
        if (tutSyncPulseTween) { tutSyncPulseTween.kill(); tutSyncPulseTween = null; }
        var bigBtn = document.getElementById('btn-sync-big');
        var smallBtn = document.getElementById('btn-sync-small');
        if (bigBtn) gsap.set(bigBtn, { clearProps: 'boxShadow' });
        if (smallBtn) { gsap.killTweensOf(smallBtn); gsap.set(smallBtn, { clearProps: 'boxShadow' }); }
    }

    async function syncTutorial() {
        if (!Auth.isLoggedIn()) { showAuth(); return; }
        killSyncPulse();
        var syncBtn = document.getElementById('btn-sync-big');
        var syncSmall = document.getElementById('btn-sync-small');
        var progressEl = document.getElementById('sync-progress');
        var summaryEl = document.getElementById('sync-summary');
        if (progressEl) { progressEl.classList.add('show'); progressEl.textContent = '⏳ 正在连接 GitHub API...'; }
        if (summaryEl) summaryEl.textContent = '';
        if (syncBtn) { syncBtn.disabled = true; syncBtn.textContent = '⏳ 同步中...'; }
        if (syncSmall) { syncSmall.disabled = true; syncSmall.textContent = '⏳ ...'; }
        try {
            var res = await fetch('/api/python-tutorial/sync', { method: 'POST', headers: Auth.headers() });
            var data = await res.json();
            if (data.success) {
                if (progressEl) progressEl.textContent = '✅ 同步完成！';
                if (summaryEl) {
                    summaryEl.textContent = '共 ' + data.sectionCount + ' 个章节，' + data.totalDays + ' 篇教程';
                }
                state.tutorialLoaded = true;
                setTimeout(async function() {
                    var w = document.getElementById('tutorial-welcome');
                    if (w) {
                        gsap.to(w, safeTutProps({ opacity: 0, y: -10, duration: 0.3, ease: 'power2.in', onComplete: function() {
                            w.style.display = 'none';
                        }}));
                    }
                    await loadTutorialStructure();
                    if (state.tutorialStructure && state.tutorialStructure.sections.length > 0) {
                        var lastDay = getLastReadDay();
                        if (lastDay) {
                            loadTutorialContent(lastDay);
                        } else {
                            var firstSection = state.tutorialStructure.sections[0];
                            if (firstSection.days && firstSection.days.length > 0) {
                                loadTutorialContent(firstSection.days[0].day);
                            }
                        }
                    }
                }, 800);
            } else {
                if (progressEl) progressEl.textContent = '❌ ' + (data.error || '同步失败');
            }
        } catch (err) {
            if (progressEl) progressEl.textContent = '❌ 网络错误: ' + err.message;
        } finally {
            if (progressEl) progressEl.classList.remove('show');
            if (syncBtn) { syncBtn.disabled = false; syncBtn.textContent = '🔄 同步教程'; }
            if (syncSmall) { syncSmall.disabled = false; syncSmall.textContent = '🔄 同步'; }
        }
    }

    async function loadTutorialStructure() {
        try {
            var res = await fetch('/api/python-tutorial/structure');
            var data = await res.json();
            state.tutorialStructure = data;
            renderTutorialSidebar(data);
        } catch (err) { console.warn('加载教程结构失败:', err); }
    }

    function renderTutorialSidebar(data) {
        var container = document.getElementById('tut-section-list');
        if (!container) return;
        // 重置入口标志（切换模式或刷新数据时允许重播）
        state._tutSidebarAnimatedEntrance = false;
        state._tutFirstWobbleDone = false;
        if (!data || !data.sections || data.sections.length === 0) {
            container.innerHTML = '<p style="font-size:0.8rem;color:var(--text-tertiary);padding:12px;">暂无教程数据，请先同步~</p>';
            return;
        }
        var progress = getTutorialProgress();
        var html = '';
        (data.sections || []).forEach(function(section, secIdx) {
            var isFirst = secIdx === 0;
            html += '<div class="section-group glass-card' + (isFirst ? '' : ' collapsed') + '">';
            html += '<div class="section-header" onclick="toggleSection(this.parentElement)">';
            html += '<span class="section-icon">' + (section.icon || '📎') + '</span>';
            html += '<span class="section-title-text">' + escHtml(section.title) + '</span>';
            html += '<span class="section-count">' + (section.days || []).length + '</span>';
            html += '<span class="section-arrow">▼</span>';
            html += '</div><ul class="day-list">';
            (section.days || []).forEach(function(day) {
                var prog = progress[String(day.day)] || 'none';
                var activeClass = state.tutorialCurrentDay === day.day ? ' active' : '';
                html += '<li class="day-item' + activeClass + '" onclick="loadTutorialContent(' + day.day + ')" data-day="' + day.day + '">';
                html += '<span class="day-progress-dot ' + prog + '"></span>';
                html += '<span class="day-number">D' + day.day + '</span>';
                html += '<span class="day-title-text">' + escHtml(day.title) + '</span></li>';
            });
            html += '</ul></div>';
        });
        container.innerHTML = html;

        // 初始化折叠状态的 day-list 高度为 0
        container.querySelectorAll('.section-group.collapsed .day-list').forEach(function(dl) {
            dl.style.height = '0px';
        });

        // GSAP 事件代理（仅绑定一次）
        setupTutorialSidebarDelegation();

        // 入场动画 + 首节摇摆
        if (!state._tutSkipEntrance) {
            animateTutorialSidebarEntrance();
            animateFirstSectionWobble();
        }
    }

    // 侧边栏事件代理（只绑定一次）
    var _tutDelegationSetup = false;
    function setupTutorialSidebarDelegation() {
        if (_tutDelegationSetup) return;
        _tutDelegationSetup = true;
        var listEl = document.getElementById('tut-section-list');
        if (!listEl) return;

        // section-header 悬停发光
        listEl.addEventListener('mouseenter', function(e) {
            var header = e.target.closest('.section-header');
            if (header) {
                var group = header.parentElement;
                gsap.to(group, safeTutProps({ boxShadow: '0 0 20px rgba(255,159,67,0.18), 0 4px 12px rgba(0,0,0,0.04)', y: -1, duration: 0.3, ease: 'power2.out', overwrite: 'auto' }));
            }
            var item = e.target.closest('.day-item');
            if (item && !item.classList.contains('active')) {
                gsap.to(item, safeTutProps({ x: 3, backgroundColor: 'rgba(255,159,67,0.06)', duration: 0.2, ease: 'power2.out', overwrite: 'auto' }));
            }
        }, true);

        listEl.addEventListener('mouseleave', function(e) {
            var header = e.target.closest('.section-header');
            if (header) {
                var group = header.parentElement;
                gsap.to(group, safeTutProps({ boxShadow: 'none', y: 0, duration: 0.35, ease: 'power2.out', overwrite: 'auto' }));
            }
            var item = e.target.closest('.day-item');
            if (item && !item.classList.contains('active')) {
                gsap.to(item, safeTutProps({ x: 0, backgroundColor: 'transparent', duration: 0.25, ease: 'power2.out', overwrite: 'auto' }));
            }
        }, true);

        // day-item 按下/松开反馈
        listEl.addEventListener('mousedown', function(e) {
            var item = e.target.closest('.day-item');
            if (item) {
                gsap.to(item, safeTutProps({ scale: 0.96, duration: 0.08, ease: 'power2.in', overwrite: 'auto' }));
            }
        }, true);

        listEl.addEventListener('mouseup', function(e) {
            var item = e.target.closest('.day-item');
            if (item) {
                gsap.to(item, safeTutProps({ scale: 1, duration: 0.15, ease: 'back.out(2)', overwrite: 'auto' }));
            }
        }, true);
    }

    function animateTutorialSidebarEntrance() {
        if (reduceMotion || state._tutSidebarAnimatedEntrance) return;
        state._tutSidebarAnimatedEntrance = true;
        var cards = document.querySelectorAll('#tut-section-list .section-group');
        gsap.fromTo(cards,
            { opacity: 0, y: 16, scale: 0.97 },
            { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: 'back.out(1.2)', stagger: 0.06 }
        );
    }

    function animateFirstSectionWobble() {
        if (reduceMotion || state._tutFirstWobbleDone) return;
        state._tutFirstWobbleDone = true;
        var firstGroup = document.querySelector('#tut-section-list .section-group');
        if (!firstGroup) return;
        var icon = firstGroup.querySelector('.section-icon');
        var count = firstGroup.querySelector('.section-count');
        if (icon) {
            gsap.timeline()
                .to(icon, { rotation: -8, duration: 0.25, ease: 'power1.inOut' })
                .to(icon, { rotation: 6, duration: 0.3, ease: 'power1.inOut' })
                .to(icon, { rotation: 0, duration: 0.25, ease: 'power1.out' });
        }
        if (count) {
            gsap.timeline()
                .to(count, { rotation: -6, duration: 0.25, ease: 'power1.inOut' }, '+=0.1')
                .to(count, { rotation: 4, duration: 0.3, ease: 'power1.inOut' })
                .to(count, { rotation: 0, duration: 0.25, ease: 'power1.out' });
        }
    }
    // GSAP 展开/收起动画
    function toggleSection(el) {
        if (!el) return;
        var isOpening = el.classList.contains('collapsed');
        var allGroups = document.querySelectorAll('#tut-section-list .section-group');

        // 先收起所有已展开的 group
        allGroups.forEach(function(g) {
            if (g !== el && !g.classList.contains('collapsed')) {
                var dayList = g.querySelector('.day-list');
                var arrow = g.querySelector('.section-arrow');
                if (dayList) {
                    gsap.to(dayList, safeTutProps({ height: 0, opacity: 0, duration: 0.25, ease: 'power2.in', onComplete: function() {
                        g.classList.add('collapsed');
                    }}));
                }
                if (arrow) gsap.to(arrow, safeTutProps({ rotation: -90, duration: 0.25, ease: 'power2.in' }));
            }
        });

        // 展开或收起当前
        var dayList = el.querySelector('.day-list');
        var arrow = el.querySelector('.section-arrow');
        if (isOpening) {
            el.classList.remove('collapsed');
            if (dayList) {
                dayList.style.height = '0px';
                dayList.style.opacity = '0';
                gsap.to(dayList, safeTutProps({ height: dayList.scrollHeight, opacity: 1, duration: 0.35, ease: 'power2.out', onComplete: function() {
                    gsap.set(dayList, { clearProps: 'height,opacity' });
                }}));
            }
            if (arrow) gsap.to(arrow, safeTutProps({ rotation: 0, duration: 0.3, ease: 'power2.out' }));
        } else {
            if (dayList) {
                gsap.to(dayList, safeTutProps({ height: 0, opacity: 0, duration: 0.25, ease: 'power2.in', onComplete: function() {
                    el.classList.add('collapsed');
                    gsap.set(dayList, { clearProps: 'height,opacity' });
                    // 清除后立即重置高度为0，防止闪现
                    dayList.style.height = '0px';
                }}));
            }
            if (arrow) gsap.to(arrow, safeTutProps({ rotation: -90, duration: 0.25, ease: 'power2.in' }));
        }
    }

    // 活跃天条目过渡动画
    function animateActiveDay(newDayNum) {
        var allItems = document.querySelectorAll('#tut-section-list .day-item');
        allItems.forEach(function(item) {
            var isNew = parseInt(item.dataset.day) === newDayNum;
            var wasActive = item.classList.contains('active');
            // 更新 class
            item.classList.toggle('active', isNew);
            if (wasActive && !isNew) {
                // 离开活跃状态
                gsap.to(item, safeTutProps({ borderLeftColor: 'transparent', duration: 0.2, ease: 'power2.in', onComplete: function() {
                    gsap.set(item, { clearProps: 'borderLeftColor' });
                }}));
            }
            if (!wasActive && isNew) {
                // 进入活跃状态
                gsap.fromTo(item, safeTutProps({ borderLeftColor: 'transparent' }), safeTutProps({ borderLeftColor: 'var(--accent)', duration: 0.3, ease: 'back.out(1.4)', onComplete: function() {
                    gsap.set(item, { clearProps: 'borderLeftColor' });
                }}));
            }
        });
    }

    async function loadTutorialContent(dayNum) {
        var loadGen = ++_tutLoadGen;
        state.tutorialCurrentDay = dayNum;

        // 保存最后阅读位置
        setLastReadDay(dayNum);

        // 侧边栏活跃状态过渡
        animateActiveDay(dayNum);

        if (getDayProgress(dayNum) === 'none') { markDayProgress(dayNum, 'reading'); updateSidebarProgressDots(); }
        var contentEl = document.getElementById('tutorial-content-area');
        var welcomeEl = document.getElementById('tutorial-welcome');
        if (welcomeEl) welcomeEl.style.display = 'none';

        // 命中缓存 — 直接渲染，跳过网络请求（先查内存，再查 localStorage）
        var cached = _tutContentCache[dayNum] || getTutCache()[String(dayNum)];
        if (cached) {
            if (_tutAbortController) { _tutAbortController.abort(); _tutAbortController = null; }
            _tutContentCache[dayNum] = cached;  // 同步到内存缓存
            renderTutorialContent(cached);
            // 预加载下一篇
            if (cached.next) preloadAdjacentDay(cached.next);
            return;
        }

        // 取消上一个进行中的 fetch 请求
        if (_tutAbortController) { _tutAbortController.abort(); }
        _tutAbortController = new AbortController();
        var signal = _tutAbortController.signal;
        var targetDay = dayNum;

        // 加载过渡动画（onComplete 检测代际，过期则跳过）
        gsap.to(contentEl, safeTutProps({ opacity: 0, duration: 0.08, ease: 'power2.in', onComplete: function() {
            if (loadGen !== _tutLoadGen) return;
            contentEl.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-tertiary);">⏳ 加载中喵~</div>';
            gsap.fromTo(contentEl, safeTutProps({ opacity: 0, y: 6 }), safeTutProps({ opacity: 1, y: 0, duration: 0.2, ease: 'power2.out' }));
        }}));

        try {
            var res = await fetch('/api/python-tutorial/content?day=' + targetDay, { signal: signal });
            if (loadGen !== _tutLoadGen) return;
            if (!res.ok) {
                contentEl.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-tertiary);">找不到该教程喵~</div>';
                return;
            }
            var data = await res.json();
            if (loadGen !== _tutLoadGen) return;
            persistTutCache(targetDay, data);
            renderTutorialContent(data);
            // 预加载下一篇文章（后台静默）
            if (data.next) preloadAdjacentDay(data.next);
        } catch (err) {
            if (err.name === 'AbortError') return;
            if (loadGen !== _tutLoadGen) return;
            contentEl.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-tertiary);">加载失败: ' + err.message + '</div>';
        }
    }

    function renderTutorialContent(data) {
        var contentEl = document.getElementById('tutorial-content-area');
        var isDone = getDayProgress(data.day) === 'done';
        var html = '';
        html += '<div class="tut-breadcrumb"><span class="bc-section">' + (data.section.icon || '') + ' ' + escHtml(data.section.title) + '</span> <span>/</span> <span>Day ' + data.day + '</span></div>';
        html += '<h1 class="tut-title">' + escHtml(data.title) + '</h1>';
        html += '<div class="tut-meta"><span class="day-badge">Day ' + data.day + '</span><span>' + escHtml(data.section.title) + '</span></div>';
        html += '<div class="tut-body">' + renderMarkdown(data.content) + '</div>';
        html += '<div class="tut-nav">';
        if (data.prev) {
            html += '<button class="tut-nav-btn" onclick="loadTutorialContent(' + data.prev.day + ')">← <span><span class="tut-nav-label">上一篇</span><br>' + escHtml(data.prev.title) + '</span></button>';
        } else {
            html += '<button class="tut-nav-btn" disabled>← <span>已经是第一篇</span></button>';
        }
        html += '<div class="tut-nav-center"><button class="btn-mark-done' + (isDone ? ' is-done' : '') + '" onclick="toggleDayDone(' + data.day + ')" id="btn-mark-done">' + (isDone ? '✅ 已完成' : '☑️ 标记完成') + '</button></div>';
        if (data.next) {
            html += '<button class="tut-nav-btn" onclick="loadTutorialContent(' + data.next.day + ')"><span><span class="tut-nav-label">下一篇</span><br>' + escHtml(data.next.title) + '</span> →</button>';
        } else {
            html += '<button class="tut-nav-btn" disabled><span>已经是最后一篇</span> →</button>';
        }
        html += '</div>';
        contentEl.innerHTML = html;

        if (typeof hljs !== 'undefined') {
            contentEl.querySelectorAll('pre code').forEach(function(block) { hljs.highlightElement(block); });
        }
        contentEl.querySelectorAll('.tut-body pre').forEach(function(pre) {
            var btn = document.createElement('button');
            btn.className = 'code-copy-btn'; btn.textContent = '📋 复制';
            btn.onclick = function() {
                var code = (pre.querySelector('code') || pre).textContent;
                navigator.clipboard.writeText(code).then(function() {
                    btn.textContent = '✅ 已复制'; btn.classList.add('copied');
                    setTimeout(function() { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 2000);
                }).catch(function() { showToast('复制失败喵~'); });
            };
            pre.appendChild(btn);
        });
        contentEl.querySelectorAll('.tut-body img').forEach(function(img) {
            img.style.cursor = 'pointer';
            img.addEventListener('click', function() { openLightbox(this.src); });
        });

        // 代码复制按钮弹入
        contentEl.querySelectorAll('.tut-body pre .code-copy-btn').forEach(function(btn) {
            gsap.fromTo(btn, safeTutProps({ opacity: 0, scale: 0.8 }), safeTutProps({ opacity: 1, scale: 1, duration: 0.2, ease: 'back.out(1.5)' }));
        });

        // 内容级联入场
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setupTutorialReadTracker(data.day);

        if (reduceMotion) {
            gsap.fromTo(contentEl, safeTutProps({ opacity: 0 }), safeTutProps({ opacity: 1, duration: 0.2 }));
            return;
        }

        var cascadeChildren = contentEl.querySelectorAll('.tut-breadcrumb, .tut-title, .tut-meta, .tut-body, .tut-nav');
        gsap.set(cascadeChildren, { opacity: 0, y: 12 });
        var tl = gsap.timeline();
        // 面包屑
        tl.to(cascadeChildren[0], { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' });
        // 标题（提前0.15s触发）
        if (cascadeChildren[1]) tl.to(cascadeChildren[1], { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' }, '-=0.15');
        // 元信息
        if (cascadeChildren[2]) tl.to(cascadeChildren[2], { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' }, '-=0.15');
        // 正文
        if (cascadeChildren[3]) tl.to(cascadeChildren[3], { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, '-=0.15');
        // 导航按钮（带方向感）
        if (cascadeChildren[4]) {
            var prevBtn = cascadeChildren[4].querySelector('.tut-nav-btn:first-child');
            var nextBtn = cascadeChildren[4].querySelector('.tut-nav-btn:last-child');
            gsap.set(cascadeChildren[4], { opacity: 0, y: 0 });
            tl.to(cascadeChildren[4], { opacity: 1, duration: 0.25, ease: 'power2.out' }, '-=0.1');
            if (prevBtn) tl.fromTo(prevBtn, { x: -12, opacity: 0 }, { x: 0, opacity: 1, duration: 0.3, ease: 'power2.out' }, '-=0.1');
            if (nextBtn) tl.fromTo(nextBtn, { x: 12, opacity: 0 }, { x: 0, opacity: 1, duration: 0.3, ease: 'power2.out' }, '-=0.25');
        }
        // 清理
        tl.eventCallback('onComplete', function() {
            gsap.set(cascadeChildren, { clearProps: 'opacity,transform' });
        });

        // Day badge 翻转
        var dayBadge = contentEl.querySelector('.day-badge');
        if (dayBadge) {
            gsap.fromTo(dayBadge, safeTutProps({ rotationX: 90, opacity: 0 }), safeTutProps({ rotationX: 0, opacity: 1, duration: 0.35, ease: 'back.out(1.2)' }));
        }
    }

    function toggleDayDone(dayNum) {
        var current = getDayProgress(dayNum);
        markDayProgress(dayNum, current === 'done' ? 'reading' : 'done');
        var btn = document.getElementById('btn-mark-done');
        var isDone = getDayProgress(dayNum) === 'done';
        if (btn) {
            btn.textContent = isDone ? '✅ 已完成' : '☑️ 标记完成';
            btn.classList.toggle('is-done', isDone);
            // 弹跳庆祝
            gsap.timeline()
                .to(btn, safeTutProps({ scale: 1.08, duration: 0.2, ease: 'back.out(2)' }))
                .to(btn, safeTutProps({ scale: 1, duration: 0.25, ease: 'power2.out' }));
        }
        updateSidebarProgressDots();
    }

    function updateSidebarProgressDots() {
        var progress = getTutorialProgress();
        document.querySelectorAll('#tut-section-list .day-item').forEach(function(item) {
            var dayNum = parseInt(item.dataset.day);
            var newProg = progress[String(dayNum)] || 'none';
            var dot = item.querySelector('.day-progress-dot');
            if (!dot) return;

            var oldProg = _tutPrevDotStates[String(dayNum)] || dot.className.replace('day-progress-dot ', '') || 'none';
            // 更新追踪状态
            _tutPrevDotStates[String(dayNum)] = newProg;

            // 状态未变，跳过动画
            if (oldProg === newProg) {
                dot.className = 'day-progress-dot ' + newProg;
                return;
            }

            // 先更新 class
            dot.className = 'day-progress-dot ' + newProg;

            // 动画过渡
            if (reduceMotion) return;

            if (oldProg === 'none' && newProg === 'reading') {
                // none → reading: 弹入
                gsap.fromTo(dot, { scale: 0, backgroundColor: '#d0d0d0' }, { scale: 1, backgroundColor: 'var(--accent)', duration: 0.35, ease: 'back.out(1.7)', onComplete: function() {
                    gsap.set(dot, { clearProps: 'transform,backgroundColor' });
                }});
            } else if (newProg === 'done') {
                // → done: 弹跳庆祝
                gsap.timeline()
                    .to(dot, { scale: 1.4, duration: 0.15, ease: 'power2.out' })
                    .to(dot, { scale: 1, duration: 0.2, ease: 'back.out(2)', onComplete: function() {
                        gsap.set(dot, { clearProps: 'transform' });
                    }});
            } else if (oldProg === 'done' && newProg !== 'done') {
                // done → reading: 缩弹
                gsap.timeline()
                    .to(dot, { scale: 0.85, duration: 0.1, ease: 'power2.in' })
                    .fromTo(dot, { scale: 0.85, backgroundColor: '#20bf6b' }, { scale: 1, backgroundColor: 'var(--accent)', duration: 0.3, ease: 'back.out(1.4)', onComplete: function() {
                        gsap.set(dot, { clearProps: 'transform,backgroundColor' });
                    }});
            }
        });
    }

    var tutReadTracker = null;
    function setupTutorialReadTracker(dayNum) {
        if (tutReadTracker) document.removeEventListener('scroll', tutReadTracker);
        tutReadTracker = function() {
            var scrollBottom = window.scrollY + window.innerHeight;
            if (document.documentElement.scrollHeight - scrollBottom < 120) {
                if (getDayProgress(dayNum) !== 'done') {
                    markDayProgress(dayNum, 'done');
                    var btn = document.getElementById('btn-mark-done');
                    if (btn) { btn.textContent = '✅ 已完成'; btn.classList.add('is-done'); }
                    updateSidebarProgressDots();
                }
            }
        };
        document.addEventListener('scroll', tutReadTracker, { passive: true });
    }

    var tutSearchTimer = null;
    function onTutorialSearch() {
        clearTimeout(tutSearchTimer);
        tutSearchTimer = setTimeout(async function() {
            var q = document.getElementById('tut-search-input').value.trim();
            if (!q) {
                // 恢复全部显示
                document.querySelectorAll('#tut-section-list .section-group').forEach(function(g) { g.style.display = ''; });
                document.querySelectorAll('#tut-section-list .day-item').forEach(function(d) { d.style.display = ''; });
                // 恢复之前的内容
                state._tutSkipEntrance = false;
                if (state.tutorialCurrentDay) {
                    loadTutorialContent(state.tutorialCurrentDay);
                }
                return;
            }
            // 搜索时跳过入场动画
            state._tutSkipEntrance = true;
            try {
                var res = await fetch('/api/python-tutorial/search?q=' + encodeURIComponent(q));
                var data = await res.json();
                var matchDays = new Set((data.results || []).map(function(r) { return r.day; }));
                // 过滤侧边栏
                document.querySelectorAll('#tut-section-list .day-item').forEach(function(item) {
                    item.style.display = matchDays.has(parseInt(item.dataset.day)) ? '' : 'none';
                });
                document.querySelectorAll('#tut-section-list .section-group').forEach(function(group) {
                    var hasVisible = false;
                    group.querySelectorAll('.day-item').forEach(function(item) { if (item.style.display !== 'none') hasVisible = true; });
                    group.style.display = hasVisible ? '' : 'none';
                    if (hasVisible) group.classList.remove('collapsed');
                });
                // 在内容区显示搜索结果
                var contentEl = document.getElementById('tutorial-content-area');
                if (data.results && data.results.length > 0) {
                    var html = '<div style="padding:8px 0;"><h3 style="font-size:1.1rem;margin-bottom:16px;color:var(--text-primary);">🔍 搜索「' + escHtml(q) + '」— ' + data.count + ' 个结果</h3>';
                    data.results.forEach(function(r) {
                        html += '<div class="glass-card" style="padding:16px 20px;margin-bottom:10px;cursor:pointer;" onclick="loadTutorialContent(' + r.day + ')">';
                        html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
                        html += '<span style="font-size:0.75rem;background:' + (r.sectionIcon ? 'var(--accent)' : '#888') + ';color:#fff;padding:2px 8px;border-radius:10px;">' + escHtml(r.sectionIcon || '') + ' ' + escHtml(r.sectionTitle) + '</span>';
                        html += '<span style="font-weight:600;font-size:0.95rem;color:var(--text-primary);">D' + r.day + ' ' + escHtml(r.title) + '</span></div>';
                        html += '<p style="font-size:0.82rem;color:var(--text-secondary);line-height:1.5;margin:0;">' + escHtml(r.excerpt) + '</p></div>';
                    });
                    html += '</div>';
                    contentEl.innerHTML = html;
                } else {
                    contentEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-tertiary);">未找到相关教程喵~</div>';
                }
            } catch (err) { console.warn('教程搜索失败:', err); }
        }, 300);
    }

    function escHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ---- 初始化 ----
    async function init() {
        MiaositeAuth.mount({
            toast: showToast,
            onAuthChange: function() {
                if (typeof loadArticles === 'function') loadArticles();
            }
        });
        initModeTabs();
        await Promise.all([loadCategories(), loadTags(), loadArticles()]);
        checkTutorialStatus();
    }
    init();
    </script>
