    ];

    function populateCategorySelect() {
        const select = document.getElementById('editor-category');
        const popup = document.getElementById('category-popup');
        if (select.options.length > 1) return;
        let html = '';
        CATS.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.slug;
            opt.textContent = c.name;
            select.appendChild(opt);
            html += `<div class="category-option" data-value="${c.slug}" onclick="selectCategory('${c.slug}')">
                <span class="category-option-dot" style="background:${CAT_COLORS[c.slug]};"></span>
                ${c.name}
            </div>`;
        });
        popup.innerHTML = html;
    }

    function toggleCategoryPopup() {
        const popup = document.getElementById('category-popup');
        const trigger = document.getElementById('category-trigger');
        const isOpen = popup.classList.contains('show');
        if (isOpen) {
            popup.classList.remove('show');
            trigger.classList.remove('open');
        } else {
            // 高亮当前选中项
            const curVal = document.getElementById('editor-category').value;
            popup.querySelectorAll('.category-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.value === curVal);
            });
            popup.classList.add('show');
            trigger.classList.add('open');
        }
    }

    function selectCategory(slug) {
        const select = document.getElementById('editor-category');
        const popup = document.getElementById('category-popup');
        const trigger = document.getElementById('category-trigger');
        const dot = document.getElementById('cat-dot');
        const label = document.getElementById('cat-label');
        select.value = slug;
        popup.classList.remove('show');
        trigger.classList.remove('open');
        // 更新触发器显示
        const cat = CATS.find(c => c.slug === slug);
        if (cat) {
            dot.style.background = CAT_COLORS[slug];
            dot.style.display = '';
            label.textContent = cat.name;
            label.classList.remove('placeholder');
        } else {
            dot.style.display = 'none';
            label.textContent = '请选择分类';
            label.classList.add('placeholder');
        }
    }

    function syncCategoryTrigger() {
        const slug = document.getElementById('editor-category').value;
        const dot = document.getElementById('cat-dot');
        const label = document.getElementById('cat-label');
        const cat = CATS.find(c => c.slug === slug);
        if (cat) {
            dot.style.background = CAT_COLORS[slug];
            dot.style.display = '';
            label.textContent = cat.name;
            label.classList.remove('placeholder');
        } else {
            dot.style.display = 'none';
            label.textContent = '请选择分类';
            label.classList.add('placeholder');
        }
    }

    // 点击外部关闭分类弹出
    document.addEventListener('click', e => {
        const popup = document.getElementById('category-popup');
        const trigger = document.getElementById('category-trigger');
        if (popup && trigger && popup.classList.contains('show') &&
            !popup.contains(e.target) && !trigger.contains(e.target)) {
            popup.classList.remove('show');
            trigger.classList.remove('open');
        }
    });

    function cancelEditor() {
        if (state.currentArticle && state.editingId) {
            viewArticle(state.currentArticle.id);
        } else {
            goBackToList();
        }
    }

    async function saveArticle() {
        const title = document.getElementById('editor-title').value.trim();
        const content = document.getElementById('editor-content').value.trim();
        const category = document.getElementById('editor-category').value;
        const tagsRaw = document.getElementById('editor-tags').value;

        if (title.length < 3 || title.length > 100) {
            showToast('标题需要 3-100 个字符喵~');
            return;
        }
        if (!content) {
            showToast('内容不能为空喵~');
            return;
        }
        if (!category) {
            showToast('请选择分类喵~');
            return;
        }

        const tags = tagsRaw.split(/[,，]/).map(t => t.trim()).filter(Boolean).slice(0, 10);

        const btn = document.getElementById('btn-save-article');
        btn.disabled = true;
        btn.textContent = '⏳ 保存中...';

        try {
            const method = state.editingId ? 'PUT' : 'POST';
            const url = state.editingId ? `/api/wiki/${state.editingId}` : '/api/wiki';
            const body = { title, content, category, tags };
            if (state.bookFile) {
                body.bookFile = state.bookFile;
            }

            const resp = await Auth.fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.error || '保存失败');
            }

            const saved = await resp.json();
            showToast(state.editingId ? '文章已更新喵~' : '文章已创建喵~');

            // 刷新列表和侧边栏
            await Promise.all([loadCategories(), loadTags()]);
            viewArticle(saved.id);

        } catch (err) {
            showToast(err.message || '保存失败，请稍后再试喵~');
        } finally {
            btn.disabled = false;
            btn.textContent = '💾 保存文章';
        }
    }

    // ---- 删除文章 ----
    async function deleteArticle(event, id) {
        event.stopPropagation();
        if (!confirm('确定要删除这篇文章吗？删除后无法恢复喵~')) return;

        try {
            const resp = await Auth.fetch(`/api/wiki/${id}`, { method: 'DELETE' });
            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.error || '删除失败');
            }
            showToast('文章已删除喵~');
            state.currentArticle = null;
            state.editingId = null;
            await Promise.all([loadCategories(), loadTags(), loadArticles()]);
        } catch (err) {
            showToast(err.message || '删除失败喵~');
        }
    }

    // ---- 图片上传 ----
    function triggerImageUpload() {
        if (!Auth.isLoggedIn()) {
            showAuth();
            return;
        }
        document.getElementById('image-upload-input').click();
    }

    async function handleImageUpload(event) {
        const files = event.target.files;
        if (!files || files.length === 0) return;

        const hint = document.getElementById('upload-hint');
        hint.textContent = '上传中...';

        const formData = new FormData();
        for (const f of files) {
            formData.append('files', f);
        }

        try {
            const resp = await Auth.fetch('/api/wiki/upload', {
                method: 'POST',
                body: formData
            });

            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.error || '上传失败');
            }

            const result = await resp.json();
            const items = Array.isArray(result) ? result : [result];
            const textarea = document.getElementById('editor-content');
            let insertText = '';
            items.forEach(item => {
                insertText += `![${item.filename}](${item.url})\n`;
            });

            const pos = textarea.selectionStart;
            const before = textarea.value.substring(0, pos);
            const after = textarea.value.substring(pos);
            textarea.value = before + insertText + after;
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = pos + insertText.length;

            hint.textContent = `已上传 ${items.length} 张图片 ✓`;
            updatePreview();
        } catch (err) {
            hint.textContent = '上传失败';
            showToast(err.message || '图片上传失败喵~');
        }

        event.target.value = '';
    }

    // ---- 书籍上传 ----
    function triggerBookUpload() {
        if (!Auth.isLoggedIn()) { showAuth(); return; }
        document.getElementById('book-upload-input').click();
    }

    async function handleBookUpload(event) {
        const files = event.target.files;
        if (!files || files.length === 0) return;

        const file = files[0];
        const hint = document.getElementById('upload-hint');
        hint.textContent = '上传中...';

        const formData = new FormData();
        formData.append('files', file);

        try {
            const resp = await Auth.fetch('/api/wiki/upload-book', {
                method: 'POST',
                body: formData
            });
            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.error || '上传失败');
            }
            const result = await resp.json();
            state.bookFile = result;
            showBookFilePreview();
            hint.textContent = '书籍已上传 ✓';
        } catch (err) {
            hint.textContent = '上传失败';
            showToast(err.message || '书籍上传失败喵~');
        }
        event.target.value = '';
    }

    function showBookFilePreview() {
        const container = document.getElementById('book-file-preview');
        if (!state.bookFile) {
            container.style.display = 'none';
            container.innerHTML = '';
            return;
        }
        container.style.display = '';
        const bf = state.bookFile;
        const typeLabels = { pdf: 'PDF', epub: 'EPUB', txt: 'TXT', md: 'MD', docx: 'DOCX' };
        container.innerHTML = `
            <span class="book-file-info">
                📖 ${escapeHtml(bf.filename)} (${typeLabels[bf.type] || bf.type})
                <span class="remove-book" onclick="removeBookFile()" title="移除书籍">✕</span>
            </span>`;
    }

    function removeBookFile() {
        state.bookFile = null;
        showBookFilePreview();
        document.getElementById('upload-hint').textContent = '';
    }

    // ---- 内置阅读器 ----
    function openReader(bookFile) {
        if (!bookFile || !bookFile.url) return;
        const overlay = document.getElementById('reader-overlay');
        document.getElementById('reader-title').textContent = bookFile.filename || '阅读中...';
        document.getElementById('reader-body').innerHTML =
            '<div class="reader-loading" id="reader-loading">📖 正在加载书籍...</div>';
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';

        const body = document.getElementById('reader-body');
        const type = (bookFile.type || '').toLowerCase();

        if (type === 'pdf') {
            // 浏览器原生 PDF 阅读器
            body.innerHTML = `<iframe src="${bookFile.url}"></iframe>`;
        } else if (type === 'txt' || type === 'md') {
            // 文本/Markdown 文件
            fetch(`/api/wiki/read-text?url=${encodeURIComponent(bookFile.url)}`)
                .then(r => r.json())
                .then(data => {
                    let html;
                    if (type === 'md' && typeof marked !== 'undefined') {
                        html = marked.parse(data.content);
                    } else {
                        html = `<pre>${escapeHtml(data.content)}</pre>`;
                    }
                    body.innerHTML = `<div class="reader-text-container reader-font-md">${html}</div>`;
                })
                .catch(() => {
                    body.innerHTML = '<div class="reader-loading">😿 加载失败，请稍后再试喵~</div>';
                });
        } else if (type === 'epub') {
            // EPUB 使用 epub.js
            if (typeof ePub !== 'undefined') {
                try {
                    body.innerHTML = '<div id="epub-viewer" style="width:100%;height:100%;"></div>';
                    const book = ePub(bookFile.url);
                    const rendition = book.renderTo('epub-viewer', {
                        width: '100%',
                        height: '100%',
                        spread: 'none'
                    });
                    rendition.display();
                    // 保存引用以便翻页
                    state._epubRendition = rendition;
                    state._epubBook = book;
                } catch (e) {
                    body.innerHTML = '<div class="reader-loading">😿 EPUB 加载失败喵~</div>';
                }
            } else {
                body.innerHTML = '<div class="reader-loading">😿 EPUB 阅读器未加载，请刷新页面重试喵~</div>';
            }
        } else {
            // 其他格式尝试用 iframe
            body.innerHTML = `<iframe src="${bookFile.url}"></iframe>`;
        }
    }

    function closeReader() {
        const overlay = document.getElementById('reader-overlay');
        overlay.classList.remove('show');
        document.body.style.overflow = '';
        // 清理 EPUB 资源
        if (state._epubRendition) {
            try { state._epubRendition.destroy(); } catch {}
            state._epubRendition = null;
            state._epubBook = null;
        }
    }

    function toggleReaderTheme() {
        const overlay = document.getElementById('reader-overlay');
        state.readerTheme = state.readerTheme === 'dark' ? 'light' : 'dark';
        if (state.readerTheme === 'light') {
            overlay.style.background = '#f5f0eb';
            const textContainer = overlay.querySelector('.reader-text-container');
            if (textContainer) {
                textContainer.style.background = '#faf8f5';
                textContainer.style.color = '#3d3835';
            }
            const toolbar = overlay.querySelector('.reader-toolbar');
            if (toolbar) {
                toolbar.style.background = '#ede4da';
                toolbar.style.borderBottomColor = 'rgba(0,0,0,0.06)';
            }
            overlay.querySelectorAll('.reader-btn').forEach(b => {
                b.style.color = '#5c5348';
                b.style.borderColor = 'rgba(0,0,0,0.1)';
            });
            const title = overlay.querySelector('.reader-title');
            if (title) title.style.color = '#3d3835';
        } else {
            overlay.style.background = '#1a1a2e';
            const textContainer = overlay.querySelector('.reader-text-container');
            if (textContainer) {
                textContainer.style.background = '#1e1e2e';
                textContainer.style.color = '#e8e0d8';
            }
            const toolbar = overlay.querySelector('.reader-toolbar');
            if (toolbar) {
                toolbar.style.background = '#16213e';
                toolbar.style.borderBottomColor = 'rgba(255,255,255,0.08)';
            }
            overlay.querySelectorAll('.reader-btn').forEach(b => {
                b.style.color = '#ccc';
                b.style.borderColor = 'rgba(255,255,255,0.15)';
            });
            const title = overlay.querySelector('.reader-title');
            if (title) title.style.color = '#ddd';
        }
    }

    function changeReaderFont(delta) {
        state.readerFontSize = Math.max(0, Math.min(2, state.readerFontSize + delta));
        const container = document.querySelector('.reader-text-container');
        if (!container) return;
        container.classList.remove('reader-font-sm', 'reader-font-md', 'reader-font-lg');
        const classes = ['reader-font-sm', 'reader-font-md', 'reader-font-lg'];
        container.classList.add(classes[state.readerFontSize]);
    }

    // ESC 关闭阅读器
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            const readerOpen = document.getElementById('reader-overlay').classList.contains('show');
            if (readerOpen) {
                closeReader();
                return;
            }
        }
    });

    // ---- 编辑器预览 ----
    function updatePreview() {
        const content = document.getElementById('editor-content').value;
        const previewContainer = document.getElementById('editor-preview-content');
        previewContainer.innerHTML = content ? renderMarkdown(content) :
            '<span style="color:var(--text-tertiary);font-size:13px;">在左侧输入 Markdown 内容...</span>';
    }

    function togglePreview() {
        const preview = document.getElementById('editor-preview');
        const btn = document.getElementById('preview-toggle-btn');
        if (state.previewVisible) {
            preview.style.display = 'none';
            btn.textContent = '👁️ 显示预览';
            state.previewVisible = false;
        } else {
            preview.style.display = '';
            updatePreview();
            btn.textContent = '🙈 隐藏预览';
            state.previewVisible = true;
        }
    }

    // ---- 视图切换 ----
    function showView(view) {
        state.view = view;
        document.getElementById('article-list').style.display = view === 'list' ? '' : 'none';
        document.getElementById('pagination').style.display = view === 'list' ? '' : 'none';
        document.getElementById('article-detail').classList.toggle('show', view === 'detail');
        document.getElementById('editor-view').classList.toggle('show', view === 'editor');
        document.getElementById('result-count').style.display = view === 'list' ? '' : 'none';
        document.getElementById('btn-create').style.display =
            (view === 'detail' || view === 'editor') ? 'none' : '';
    }

    // ---- 灯箱 ----
    function openLightbox(url) {
        const overlay = document.getElementById('lightbox-overlay');
        document.getElementById('lightbox-img').src = url;
        overlay.classList.add('show');
    }
    function closeLightbox() {
        document.getElementById('lightbox-overlay').classList.remove('show');
    }

    // ---- Auth UI ----
    function showAuth() {
        document.getElementById('auth-overlay').classList.add('show');
        document.getElementById('auth-error').style.display = 'none';
    }
    function closeAuth() {
        document.getElementById('auth-overlay').classList.remove('show');
    }
    function switchAuthTab(tab) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.auth-tab[data-tab="${tab}"]`).classList.add('active');
        document.getElementById('auth-form-login').style.display = tab === 'login' ? '' : 'none';
        document.getElementById('auth-form-register').style.display = tab === 'register' ? '' : 'none';
        document.getElementById('auth-error').style.display = 'none';
    }

    function showAuthError(msg) {
        const el = document.getElementById('auth-error');
        el.textContent = msg;
        el.style.display = '';
    }

    async function doLogin() {
        const id = document.getElementById('login-id').value.trim();
        const password = document.getElementById('login-password').value;
        if (!id || !password) {
            showAuthError('请填写用户名/邮箱和密码喵~');
            return;
        }
        try {
            const resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, password })
            });
            const data = await resp.json();
            if (!resp.ok) {
                showAuthError(data.error || '登录失败喵~');
                return;
            }
            localStorage.setItem('miaosite_token', data.token);
            localStorage.setItem('miaosite_user', JSON.stringify(data.user));
            closeAuth();
            updateUserUI();
            showToast('登录成功喵~ 欢迎回来！');
            loadArticles();
        } catch {
            showAuthError('网络错误，请稍后再试喵~');
        }
    }

    async function doRegister() {
        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        if (!username || username.length < 3 || username.length > 20) {
            showAuthError('用户名需要 3-20 个字符喵~');
            return;
        }
        if (!email) {
            showAuthError('请填写邮箱喵~');
            return;
        }
        if (!password || password.length < 6) {
            showAuthError('密码至少 6 个字符喵~');
            return;
        }
        try {
            const resp = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await resp.json();
            if (!resp.ok) {
                showAuthError(data.error || '注册失败喵~');
                return;
            }
            // 注册成功后自动登录
            localStorage.setItem('miaosite_token', data.token);
            localStorage.setItem('miaosite_user', JSON.stringify(data.user));
            closeAuth();
            updateUserUI();
            showToast('注册成功喵~ 已自动登录！');
            loadArticles();
        } catch {
            showAuthError('网络错误，请稍后再试喵~');
        }
    }

    function handleUserClick() {
        if (Auth.isLoggedIn()) {
            if (confirm('确定要退出登录吗喵~？')) {
                localStorage.removeItem('miaosite_token');
                localStorage.removeItem('miaosite_user');
                updateUserUI();
                showToast('已退出登录喵~');
                loadArticles();
            }
        } else {
            showAuth();
        }
    }

    function updateUserUI() {
        const btn = document.getElementById('btn-user');
        const label = document.getElementById('user-label');
        if (Auth.isLoggedIn()) {
            const user = Auth.getUser();
            label.textContent = user ? user.username : '已登录';
            btn.title = '点击退出登录';
        } else {
            label.textContent = '登录';
            btn.title = '登录/注册';
        }
    }

    // ---- 辅助 ----
    function getCategoryName(slug) {
        const names = {
            logistics: '快递物流', tech: '技术编程', literature: '文学小说',
            humanities: '人文社科', lifestyle: '生活百科', business: '经济管理'
        };
        return names[slug] || slug;
    }

    // ---- 移动端侧边栏 ----
    function toggleSidebar() {
        document.getElementById('content-sidebar').classList.toggle('sidebar-open');
        document.getElementById('sidebar-backdrop').classList.toggle('show');
    }
    function closeSidebar() {
        document.getElementById('content-sidebar').classList.remove('sidebar-open');
        document.getElementById('sidebar-backdrop').classList.remove('show');
    }
    window.addEventListener('resize', () => {
        if (window.innerWidth > 768) {
            closeSidebar();
        }
    });

    // ---- 键盘快捷键 ----
    document.addEventListener('keydown', e => {
        // Ctrl+Enter 保存文章
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && state.view === 'editor') {
            e.preventDefault();
            saveArticle();
        }
        // Escape 关闭 auth 或 lightbox
        if (e.key === 'Escape') {
            closeAuth();
            closeLightbox();
        }
    });

    // 编辑器实时预览
    document.getElementById('editor-content').addEventListener('input', updatePreview);

    // 点击 auth overlay 背景关闭
    document.getElementById('auth-overlay').addEventListener('click', function(e) {
        if (e.target === this) closeAuth();
    });

    // ---- 初始化 ----
    async function init() {
        updateUserUI();
        await Promise.all([loadCategories(), loadTags(), loadArticles()]);
    }
    init();
    </script>
